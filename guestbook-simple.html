<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 访客留言板</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { 
    background: #0d1117; color: #e6edf3; 
    font-family: 'PingFang SC','Helvetica Neue','Arial',sans-serif;
    max-width: 800px; margin: 0 auto; padding: 20px;
  }
  .form-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 16px;
    padding: 28px; margin-bottom: 30px;
  }
  input, textarea {
    width: 100%; padding: 10px; margin: 8px 0;
    background: #21262d; border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3;
  }
  button {
    background: #58a6ff; color: #0d1117; padding: 12px 30px;
    border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
  }
  .msg-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 18px; margin-bottom: 12px;
  }
  .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .msg-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; color: #0d1117;
  }
  .msg-name { font-weight: 700; }
  .msg-body { line-height: 1.6; }
  .msg-actions { display: flex; gap: 15px; margin-top: 10px; color: #8b949e; }
  .like-btn { background: transparent; border: 1px solid #30363d; padding: 5px 12px; border-radius: 6px; cursor: pointer; color: #8b949e; }
  .like-btn.liked { color: #f85149; border-color: #f85149; }
</style>
</head>
<body>
  <h1>💬 访客留言板</h1>
  
  <!-- 表单 -->
  <div class="form-card">
    <input id="inp-name" placeholder="你的昵称" maxlength="20"><br>
    <input id="inp-city" placeholder="来自哪里（选填）" maxlength="20"><br>
    <textarea id="inp-msg" placeholder="说点什么..." rows="4" maxlength="300"></textarea><br>
    <button onclick="submitMsg()">发布留言</button>
  </div>

  <!-- 留言列表 -->
  <div id="msg-list"></div>

  <script>
    const SUPABASE_URL = 'https://fuejxbihvekyhmkrfjsb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1ZWp4YmlodmVreWhta3JmanNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjM2NDQsImV4cCI6MjA5MzkzOTY0NH0.cAhtX--9VUaBpqi84gn0jMyT8b115ZNzWN6JYDMTdnQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const colors = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#d29922','#39d353'];
    
    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
      return colors[Math.abs(h) % colors.length];
    }

    function avatarLetter(name) {
      const ch = name.trim()[0] || '?';
      return /[\u4e00-\u9fff]/.test(ch) ? ch : ch.toUpperCase();
    }

    async function loadMsgs() {
      const { data, error } = await supabase.from('guestbook').select('*').order('ts', { ascending: false });
      return data || [];
    }

    async function renderAll() {
      const list = document.getElementById('msg-list');
      const msgs = await loadMsgs();
      
      if (msgs.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:#8b949e;">还没有留言，来做第一个吧！</p>';
        return;
      }

      list.innerHTML = msgs.map(msg => `
        <div class="msg-card">
          <div class="msg-header">
            <div class="msg-avatar" style="background:${avatarColor(msg.name)}">${avatarLetter(msg.name)}</div>
            <div>
              <div class="msg-name">${escapeHtml(msg.name)}</div>
              <div style="color:#8b949e;font-size:12px;">${msg.city || '未知城市'} · ${fmtTime(msg.ts)}</div>
            </div>
          </div>
          <div class="msg-body">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
          <div class="msg-actions">
            <button class="like-btn" onclick="toggleLike('${msg.id}')">🤍 ${msg.likes || 0}</button>
            ${msg.mood ? `<span>${msg.mood}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function submitMsg() {
      const name = document.getElementById('inp-name').value.trim();
      const city = document.getElementById('inp-city').value.trim();
      const text = document.getElementById('inp-msg').value.trim();
      
      if (!name || !text) {
        alert('请填写昵称和留言内容');
        return;
      }

      await supabase.from('guestbook').insert({
        name: name.slice(0, 20),
        city: city.slice(0, 20),
        text: text,
        ts: Date.now(),
        likes: 0,
        liked_by: []
      });

      document.getElementById('inp-name').value = '';
      document.getElementById('inp-city').value = '';
      document.getElementById('inp-msg').value = '';

      await renderAll();
    }

    async function toggleLike(id) {
      const btn = event.target;
      const currentLikes = parseInt(btn.textContent.split(' ')[1]) || 0;
      
      if (btn.classList.contains('liked')) {
        await supabase.from('guestbook').update({ likes: currentLikes - 1 }).eq('id', id);
        btn.textContent = `🤍 ${currentLikes - 1}`;
        btn.classList.remove('liked');
      } else {
        await supabase.from('guestbook').update({ likes: currentLikes + 1 }).eq('id', id);
        btn.textContent = `❤️ ${currentLikes + 1}`;
        btn.classList.add('liked');
      }
    }

    function fmtTime(ts) {
      const d = new Date(ts), now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      return Math.floor(diff / 86400000) + ' 天前';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 初始化
    renderAll();
  </script>
</body>
</html>
