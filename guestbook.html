<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 访客留言板</title>
<style>
  :root {
    --bg-page: #0d1117;
    --bg-card: #161b22;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --primary-color: #58a6ff;
    --accent-red: #f85149;
    --accent-green: #3fb950;
  }
  
  body { background: var(--bg-page); color: var(--text-primary); font-family: 'PingFang SC','Helvetica Neue','Arial',sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
  
  #status-bar { background: #161b22; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; text-align: center; }
  .status-online { color: var(--accent-green); }
  .status-offline { color: var(--accent-red); }
  
  .page-header { text-align: center; margin-bottom: 40px; }
  .page-title { font-size: 32px; font-weight: 700; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  
  .form-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 28px; margin-bottom: 30px; }
  input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; }
  textarea { resize: vertical; min-height: 100px; }
  
  .submit-btn { background: var(--primary-color); color: var(--bg-page); padding: 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }
  
  .msg-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
  .msg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .msg-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--bg-page); font-size: 16px; }
  .msg-name { font-weight: 700; font-size: 15px; }
  .msg-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .msg-body { line-height: 1.7; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  
  .msg-actions { display: flex; align-items: center; gap: 20px; margin-top: 14px; color: var(--text-secondary); }
  .like-btn { background: transparent; border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .like-btn.liked { color: var(--accent-red); border-color: var(--accent-red); }

.delete-btn { background: transparent; border: 1px solid var(--accent-red); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--accent-red); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.delete-btn:hover { background: rgba(248,81,73,0.15); }

.reply-btn { background: transparent; border: 1px solid var(--primary-color); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--primary-color); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.reply-btn:hover { background: rgba(88,166,255,0.15); }
  
  .mood-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(88,166,255,0.15); color: var(--primary-color); }
  
  .reply-indicator { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .reply-indicator a { color: var(--primary-color); text-decoration: none; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  
  .stats-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; color: var(--text-secondary); font-size: 13px; }
  .refresh-btn { background: transparent; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); font-size: 12px; }
  
  .footer { text-align: center; padding: 30px 0; color: var(--text-secondary); font-size: 12px; }
  
  .mood-option { 
    background: #21262d; 
    border: 2px solid var(--border-color); 
    border-radius: 10px; 
    padding: 8px 12px; 
    cursor: pointer; 
    font-size: 20px;
    transition: all 0.2s;
  }
  .mood-option:hover { border-color: var(--primary-color); }
  .mood-option.selected { 
    border-color: var(--primary-color); 
    background: rgba(88,166,255,0.15); 
    box-shadow: 0 0 0 2px rgba(88,166,255,0.3);
  }
</style>
</head>
<body>
  <div id="status-bar" class="status-offline">🔴 连接中...</div>
  
  <div class="page-header">
    <h1 class="page-title">💬 访客留言板</h1>
    <p style="color: var(--text-secondary); margin: 5px 0;">分享你的想法，与大家交流</p>
  </div>

  <div class="stats-bar">
    <div>📝 <span id="msg-count">0</span> 条留言</div>
    <div>❤️ <span id="like-count">0</span> 次点赞</div>
    <button class="refresh-btn" onclick="refreshMsgs()">🔄 刷新</button>
  </div>

  <div class="form-card">
    <input id="inp-name" placeholder="你的昵称（随便起一个都可以！）" maxlength="20">
    <input id="inp-city" placeholder="来自哪里（选填）" maxlength="20">
    <div style="margin-bottom:10px;">
      <label style="font-size:13px; color:var(--text-secondary); display:block; margin-bottom:8px;">选择心情（可选）</label>
      <div id="mood-selector" style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="mood-option" data-mood="😊 开心" onclick="selectMood(event)">😊</button>
        <button class="mood-option" data-mood="😢 难过" onclick="selectMood(event)">😢</button>
        <button class="mood-option" data-mood="😮 惊讶" onclick="selectMood(event)">😮</button>
        <button class="mood-option" data-mood="🤔 迷茫" onclick="selectMood(event)">🤔</button>
        <button class="mood-option" data-mood="❤️ 感动" onclick="selectMood(event)">❤️</button>
        <button class="mood-option" data-mood="🔥 激动" onclick="selectMood(event)">🔥</button>
        <button class="mood-option" data-mood="✨ 期待" onclick="selectMood(event)">✨</button>
        <button class="mood-option" data-mood="💪 加油" onclick="selectMood(event)">💪</button>
        <button class="mood-option" data-mood="😎 酷" onclick="selectMood(event)">😎</button>
        <button class="mood-option" data-mood="🥳 开心" onclick="selectMood(event)">🥳</button>
        <button class="mood-option" data-mood="😴 困" onclick="selectMood(event)">😴</button>
        <button class="mood-option" data-mood="🤩 惊喜" onclick="selectMood(event)">🤩</button>
      </div>
    </div>
    <textarea id="inp-msg" placeholder="说点什么..." rows="4" maxlength="300"></textarea>
    <input type="hidden" id="inp-selected-mood" value="">
    <button class="submit-btn" onclick="submitMsg()">发布留言</button>
  </div>

  <div id="msg-list"></div>

  <div class="footer">
    <p>☁️ 留言存储在云端，所有访客都能看到</p>
  </div>

  <script>
    const API_URL = 'https://fuejxbihvekyhmkrfjsb.supabase.co/rest/v1/guestbook';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1ZWp4YmlodmVreWhta3JmanNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjM2NDQsImV4cCI6MjA5MzkzOTY0NH0.cAhtX--9VUaBpqi84gn0jMyT8b115ZNzWN6JYDMTdnQ';
    
    const statusBar = document.getElementById('status-bar');
    
    const colors = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#d29922','#39d353'];
    const moods = ['😊 开心', '😢 难过', '😮 惊讶', '🤔 迷茫', '❤️ 感动', '🔥 激动', '✨ 期待', '💪 加油', '😎 酷', '🥳 开心', '😴 困', '🤩 惊喜'];
    
    function setStatus(isOnline, msg) {
      if (isOnline) {
        statusBar.className = 'status-online';
        statusBar.innerHTML = '🟢 ' + (msg || '已连接到云端');
      } else {
        statusBar.className = 'status-offline';
        statusBar.innerHTML = '🔴 ' + (msg || '连接失败');
      }
    }

    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
      return colors[Math.abs(h) % colors.length];
    }

    function avatarLetter(name) {
      const ch = name.trim()[0] || '?';
      return /[\u4e00-\u9fff]/.test(ch) ? ch : ch.toUpperCase();
    }

    async function fetchData(url, options = {}) {
      const defaultOptions = {
        headers: {
          'apikey': API_KEY,
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        }
      };
      const response = await fetch(url, { ...defaultOptions, ...options });
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      return await response.json();
    }

    async function loadMsgs() {
      try {
        const data = await fetchData(`${API_URL}?order=ts.desc`);
        return data || [];
      } catch (e) {
        console.error('加载失败:', e);
        return [];
      }
    }

    async function updateStats() {
      const msgs = await loadMsgs();
      const totalLikes = msgs.reduce((sum, m) => sum + (m.likes || 0), 0);
      document.getElementById('msg-count').textContent = msgs.length;
      document.getElementById('like-count').textContent = totalLikes;
    }

    async function renderAll() {
      const list = document.getElementById('msg-list');
      const msgs = await loadMsgs();
      
      if (msgs.length === 0) {
        list.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📭</div><p>还没有留言，来做第一个吧！</p></div>';
        return;
      }

      const userToken = localStorage.getItem('guestbook_token');
      
      list.innerHTML = msgs.map(msg => {
        const canDelete = msg.token && userToken === msg.token;
        return `
          <div class="msg-card" data-id="${msg.id}">
            <div class="msg-header">
              <div class="msg-avatar" style="background:${avatarColor(msg.name)}">${avatarLetter(msg.name)}</div>
              <div>
                <div class="msg-name">${escapeHtml(msg.name)}</div>
                <div class="msg-meta">${msg.city || '未知城市'} · ${fmtTime(msg.ts)}</div>
              </div>
            </div>
            <div class="msg-body">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
            <div class="msg-actions">
              <button class="like-btn" data-id="${msg.id}" onclick="toggleLike(event)">🤍 ${msg.likes || 0}</button>
              ${msg.mood ? `<span class="mood-badge">${msg.mood}</span>` : ''}
              ${canDelete ? `<button class="delete-btn" data-id="${msg.id}" onclick="deleteMsg(event)">🗑️ 删除</button>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    let isSubmitting = false;
    
    async function submitMsg() {
      if (isSubmitting) return;
      isSubmitting = true;
      
      const btn = document.querySelector('.submit-btn');
      const originalText = btn.textContent;
      btn.textContent = '发布中...';
      
      const name = document.getElementById('inp-name').value.trim();
      const city = document.getElementById('inp-city').value.trim();
      const text = document.getElementById('inp-msg').value.trim();
      
      try {
        if (!name) { alert('请填写昵称'); return; }
        if (!text) { alert('请填写留言内容'); return; }

        let userToken = localStorage.getItem('guestbook_token');
        if (!userToken) {
          userToken = 'token_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('guestbook_token', userToken);
        }
        
        const selectedMood = document.getElementById('inp-selected-mood').value;
        
        const payload = {
          name: name.slice(0, 20),
          city: city.slice(0, 20),
          text: text,
          ts: Date.now(),
          likes: 0,
          token: userToken
        };
        
        if (selectedMood) {
          payload.mood = selectedMood;
        } else {
          payload.mood = moods[Math.floor(Math.random() * moods.length)];
        }
        
        await fetchData(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        alert('留言发布成功！所有访客都能看到！');
        
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-city').value = '';
        document.getElementById('inp-msg').value = '';
        document.getElementById('inp-selected-mood').value = '';
        document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('selected'));

        await renderAll();
        await updateStats();
      } catch (e) {
        if (e.message && e.message.includes('400')) {
          alert('提交失败，请检查昵称和留言内容是否符合要求！');
        } else {
          alert('提交失败: ' + e.message);
        }
      } finally {
        isSubmitting = false;
        btn.textContent = originalText;
      }
    }

    async function toggleLike(event) {
      const btn = event.target;
      const id = btn.getAttribute('data-id');
      const currentLikes = parseInt(btn.textContent.split(' ')[1]) || 0;
      
      try {
        const newLikes = btn.classList.contains('liked') ? currentLikes - 1 : currentLikes + 1;
        await fetchData(`${API_URL}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ likes: newLikes })
        });
        
        if (btn.classList.contains('liked')) {
          btn.textContent = `🤍 ${newLikes}`;
          btn.classList.remove('liked');
        } else {
          btn.textContent = `❤️ ${newLikes}`;
          btn.classList.add('liked');
        }
        await updateStats();
      } catch (e) { console.error('点赞失败:', e); }
    }

    async function refreshMsgs() {
      await renderAll();
      await updateStats();
    }

    function selectMood(event) {
      const btn = event.target;
      const mood = btn.getAttribute('data-mood');
      
      document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('inp-selected-mood').value = mood;
    }

    async function deleteMsg(event) {
      if (!confirm('确定要删除这条留言吗？')) return;
      
      const btn = event.target;
      const id = btn.getAttribute('data-id');
      
      try {
        await fetchData(`${API_URL}?id=eq.${id}`, {
          method: 'DELETE'
        });
        await renderAll();
        await updateStats();
      } catch (e) {
        console.error('删除失败:', e);
        alert('删除失败: ' + e.message);
      }
    }

    function fmtTime(ts) {
      const d = new Date(ts), now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      return Math.floor(diff / 86400000) + ' 天前';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function init() {
      try {
        await loadMsgs();
        setStatus(true, '已连接到云端');
        await renderAll();
        await updateStats();
      } catch (e) {
        console.error('初始化失败:', e);
        setStatus(false, '连接失败: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
