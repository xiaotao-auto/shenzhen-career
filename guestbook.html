<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 访客留言板</title>
<script src="nav.js" defer></script>
<style>
  :root {
    --bg-page: #0d1117;
    --bg-card: #161b22;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --primary-color: #58a6ff;
    --accent-red: #f85149;
    --accent-green: #3fb950;
  }
  
  body { background: var(--bg-page); color: var(--text-primary); font-family: 'PingFang SC','Helvetica Neue','Arial',sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
  
  #status-bar { background: #161b22; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; text-align: center; }
  .status-online { color: var(--accent-green); }
  .status-offline { color: var(--accent-red); }
  
  .page-header { text-align: center; margin-bottom: 40px; }
  .page-title { font-size: 32px; font-weight: 700; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  
  .form-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 28px; margin-bottom: 30px; }
  input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #21262d; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); box-sizing: border-box; }
  textarea { resize: vertical; min-height: 100px; }
  
  .submit-btn { background: var(--primary-color); color: var(--bg-page); padding: 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }
  
  .msg-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; margin-bottom: 15px; }
  .msg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .msg-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--bg-page); font-size: 16px; }
  .msg-name { font-weight: 700; font-size: 15px; }
  .msg-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .msg-body { line-height: 1.7; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  
  .msg-actions { display: flex; align-items: center; gap: 20px; margin-top: 14px; color: var(--text-secondary); }
  .like-btn { background: transparent; border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--text-secondary); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .like-btn.liked { color: var(--accent-red); border-color: var(--accent-red); }

.delete-btn { background: transparent; border: 1px solid var(--accent-red); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--accent-red); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.delete-btn:hover { background: rgba(248,81,73,0.15); }

.reply-btn { background: transparent; border: 1px solid var(--primary-color); padding: 6px 16px; border-radius: 20px; cursor: pointer; color: var(--primary-color); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.reply-btn:hover { background: rgba(88,166,255,0.15); }
  
  .mood-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(88,166,255,0.15); color: var(--primary-color); }
  
  .reply-indicator { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .reply-indicator a { color: var(--primary-color); text-decoration: none; }
  
  .reply-form { margin-top: 15px; padding: 15px; background: rgba(33,38,45,0.5); border-radius: 10px; border: 1px solid var(--border-color); display: none; }
  .reply-form textarea { margin-bottom: 10px; min-height: 80px; }
  .reply-form button { background: var(--primary-color); color: var(--bg-page); padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .reply-form .cancel-btn { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); margin-left: 10px; }
  
  .reply-chain { border-left: 3px solid var(--primary-color); padding-left: 15px; margin-left: 10px; margin-top: 15px; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  
  .stats-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; color: var(--text-secondary); font-size: 13px; }
  
  .footer { text-align: center; padding: 30px 0; color: var(--text-secondary); font-size: 12px; }
  

  .mood-option { 
    background: #21262d; 
    border: 2px solid var(--border-color); 
    border-radius: 10px; 
    padding: 8px 16px; 
    cursor: pointer; 
    font-size: 22px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mood-option:hover { border-color: var(--primary-color); }
  .mood-option.selected { 
    border-color: var(--primary-color); 
    background: rgba(88,166,255,0.15); 
    box-shadow: 0 0 0 2px rgba(88,166,255,0.3);
  }

  /* 平板端响应式 */
  @media screen and (max-width: 1024px) {
    body { padding: 15px; }
    .page-title { font-size: 28px; }
    .form-card { padding: 20px; }
    .msg-avatar { width: 40px; height: 40px; font-size: 14px; }
  }

  /* 手机端响应式 */
  @media screen and (max-width: 768px) {
    body { padding: 10px; }
    .page-title { font-size: 24px; gap: 8px; }
    .page-header { margin-bottom: 25px; }
    .form-card { padding: 15px; margin-bottom: 20px; }
    input, textarea { padding: 10px; font-size: 14px; }
    .submit-btn { padding: 12px; font-size: 15px; }
    .msg-card { padding: 15px; margin-bottom: 12px; }
    .msg-avatar { width: 36px; height: 36px; font-size: 13px; }
    .msg-name { font-size: 14px; }
    .msg-body { font-size: 13px; line-height: 1.6; }
    .msg-actions { gap: 10px; flex-wrap: wrap; }
    .like-btn, .delete-btn { padding: 5px 12px; font-size: 12px; }
    .mood-badge { font-size: 11px; padding: 3px 8px; }
    .stats-bar { gap: 15px; font-size: 12px; flex-wrap: wrap; }
    .refresh-btn { padding: 5px 10px; font-size: 11px; }
    #status-bar { font-size: 12px; padding: 8px 12px; }
    .footer { padding: 20px 0; font-size: 11px; }
    
    .mood-option { padding: 10px 16px; font-size: 20px; }
    
    .empty-state { padding: 40px 15px; }
    .empty-state div:first-child { font-size: 36px !important; }
  }

  /* 小屏手机响应式 */
  @media screen and (max-width: 480px) {
    .page-title { font-size: 20px; }
    .form-card { padding: 12px; }
    input, textarea { padding: 8px; font-size: 13px; }
    .msg-card { padding: 12px; }
    .msg-avatar { width: 32px; height: 32px; font-size: 12px; }
    .msg-meta { font-size: 11px; }
    
    .mood-option { padding: 10px 14px; font-size: 18px; }
  }
</style>
</head>
<body>
  <audio id="bg-audio" src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0c7ff678e.mp3?filename=soft-jazz-132384.mp3" loop style="display:none;"></audio>
  <div id="status-bar" class="status-offline">🔴 连接中...</div>
  
  <div class="page-header">
    <h1 class="page-title">💬 访客留言板</h1>
    <p style="color: var(--text-secondary); margin: 5px 0;">分享你的想法，与大家交流</p>
  </div>

  <div class="stats-bar">
    <div>📝 <span id="msg-count">0</span> 条留言</div>
  </div>

  <div class="form-card">
    <input id="inp-name" placeholder="你的昵称（随便起一个都可以！）" maxlength="20" autocomplete="off">
    <input id="inp-city" placeholder="来自哪里（选填）" maxlength="20" autocomplete="off">
    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <label style="font-size:13px; color:var(--text-secondary);">选择心情（可选）</label>
        <span style="font-size:11px;color:var(--text-secondary);opacity:0.7;">👈 左右滑动查看更多 👉</span>
      </div>
      <div id="mood-selector" style="display:flex; gap:10px; overflow-x:auto; padding:5px 0; -webkit-overflow-scrolling:touch;">
        <button class="mood-option" data-mood="😊 开心" onclick="selectMood(event)">😊</button>
        <button class="mood-option" data-mood="😢 难过" onclick="selectMood(event)">😢</button>
        <button class="mood-option" data-mood="😮 惊讶" onclick="selectMood(event)">😮</button>
        <button class="mood-option" data-mood="🤔 迷茫" onclick="selectMood(event)">🤔</button>
        <button class="mood-option" data-mood="❤️ 感动" onclick="selectMood(event)">❤️</button>
        <button class="mood-option" data-mood="🔥 激动" onclick="selectMood(event)">🔥</button>
        <button class="mood-option" data-mood="✨ 期待" onclick="selectMood(event)">✨</button>
        <button class="mood-option" data-mood="💪 加油" onclick="selectMood(event)">💪</button>
        <button class="mood-option" data-mood="😎 酷" onclick="selectMood(event)">😎</button>
        <button class="mood-option" data-mood="🥳 开心" onclick="selectMood(event)">🥳</button>
        <button class="mood-option" data-mood="😴 困" onclick="selectMood(event)">😴</button>
        <button class="mood-option" data-mood="🤩 惊喜" onclick="selectMood(event)">🤩</button>
      </div>
    </div>
    <textarea id="inp-msg" placeholder="说点什么..." rows="4" maxlength="300" autocomplete="off"></textarea>
    <input type="hidden" id="inp-selected-mood" value="">
    <button class="submit-btn" onclick="submitMsg()">发布留言</button>
  </div>

  <div id="msg-list"></div>

  <div class="footer">
    <p>☁️ 留言存储在云端，所有访客都能看到</p>
  </div>

  <script>
    const API_URL = 'https://fuejxbihvekyhmkrfjsb.supabase.co/rest/v1/guestbook';
    const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1ZWp4YmlodmVreWhta3JmanNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNjM2NDQsImV4cCI6MjA5MzkzOTY0NH0.cAhtX--9VUaBpqi84gn0jMyT8b115ZNzWN6JYDMTdnQ';
    
    const statusBar = document.getElementById('status-bar');
    
    const colors = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#d29922','#39d353'];
    const moods = ['😊 开心', '😢 难过', '😮 惊讶', '🤔 迷茫', '❤️ 感动', '🔥 激动', '✨ 期待', '💪 加油', '😎 酷', '🥳 开心', '😴 困', '🤩 惊喜'];
    
    // 背景音乐自动播放
    function initMusic() {
      const audio = document.getElementById('bg-audio');
      audio.volume = 0.7;
      
      // 用户交互后播放
      const tryPlay = () => {
        audio.play().catch(e => console.log('等待用户交互...'));
      };
      
      ['click', 'touchstart', 'scroll'].forEach(event => {
        document.addEventListener(event, tryPlay, { once: true });
      });
      
      tryPlay();
    }
    
    function setStatus(isOnline, msg) {
      if (isOnline) {
        statusBar.className = 'status-online';
        statusBar.innerHTML = '🟢 ' + (msg || '已连接到云端');
      } else {
        statusBar.className = 'status-offline';
        statusBar.innerHTML = '🔴 ' + (msg || '连接失败');
      }
    }

    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
      return colors[Math.abs(h) % colors.length];
    }

    function avatarLetter(name) {
      const ch = name.trim()[0] || '?';
      return /[\u4e00-\u9fff]/.test(ch) ? ch : ch.toUpperCase();
    }

    async function fetchData(url, options = {}) {
      const defaultOptions = {
        headers: {
          'apikey': API_KEY,
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        }
      };
      const response = await fetch(url, { ...defaultOptions, ...options });
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      return await response.json();
    }

    async function loadMsgs() {
      try {
        const data = await fetchData(`${API_URL}?order=ts.desc`);
        return data || [];
      } catch (e) {
        console.error('加载失败:', e);
        return [];
      }
    }

    async function updateStats() {
      const msgs = await loadMsgs();
      document.getElementById('msg-count').textContent = msgs.length;
    }

    let replyingToName = null;
    
    async function renderAll() {
      const list = document.getElementById('msg-list');
      const msgs = await loadMsgs();
      
      if (msgs.length === 0) {
        list.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📭</div><p>还没有留言，来做第一个吧！</p></div>';
        return;
      }

      // 分离主留言和回复
      const mainMsgs = [];
      const replies = {};
      msgs.forEach(msg => {
        if (msg.reply_to_id) {
          if (!replies[msg.reply_to_id]) {
            replies[msg.reply_to_id] = [];
          }
          replies[msg.reply_to_id].push(msg);
        } else {
          mainMsgs.push(msg);
        }
      });

      // 按时间倒序排列主留言
      mainMsgs.sort((a, b) => b.ts - a.ts);

      list.innerHTML = mainMsgs.map(msg => {
        // 获取该留言的回复并按时间正序排列
        const msgReplies = (replies[msg.id] || []).sort((a, b) => a.ts - b.ts);
        const hasReplies = msgReplies.length > 0;
        const repliesHtml = msgReplies.map(reply => `
          <div class="reply-chain">
            <div class="msg-header">
              <div class="msg-avatar" style="background:${avatarColor(reply.name)};width:32px;height:32px;font-size:12px;">${avatarLetter(reply.name)}</div>
              <div>
                <div class="msg-name" style="font-size:14px;">${escapeHtml(reply.name)}</div>
                <div class="msg-meta">${reply.city || '未知城市'} · ${fmtTime(reply.ts)}</div>
              </div>
            </div>
            <div class="msg-body" style="font-size:14px;">${escapeHtml(reply.text).replace(/\n/g, '<br>')}</div>
          </div>
        `).join('');

        return `
          <div class="msg-card" data-id="${msg.id}">
            <div class="msg-header">
              <div class="msg-avatar" style="background:${avatarColor(msg.name)}">${avatarLetter(msg.name)}</div>
              <div>
                <div class="msg-name">${escapeHtml(msg.name)}</div>
                <div class="msg-meta">${msg.city || '未知城市'} · ${fmtTime(msg.ts)}</div>
              </div>
            </div>
            <div class="msg-body">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
            <div class="msg-actions">
              <button class="like-btn" data-id="${msg.id}">❤️ ${msg.likes || 0}</button>
              <button class="reply-btn" data-id="${msg.id}" data-name="${escapeHtml(msg.name)}">💬 回复</button>
              ${msg.mood ? `<span class="mood-badge">${msg.mood}</span>` : ''}
            </div>
            
            ${hasReplies ? `
              <div class="view-replies" style="margin-top:10px;">
                <button class="toggle-replies-btn" data-id="${msg.id}" style="background:transparent;border:none;color:var(--primary-color);cursor:pointer;font-size:13px;">
                  📋 查看 ${msgReplies.length} 条回复 ▼
                </button>
              </div>
              <div class="replies-container" id="replies-${msg.id}" style="display:none;margin-top:10px;">
                ${repliesHtml}
              </div>
            ` : ''}
            
            <div class="reply-form" id="reply-form-${msg.id}" data-name="${escapeHtml(msg.name)}">
              <div style="margin-bottom: 10px; font-size: 13px; color: var(--text-secondary);">回复 @${escapeHtml(msg.name)}</div>
              <textarea id="reply-text-${msg.id}" placeholder="说点什么..." rows="3" maxlength="200"></textarea>
              <button class="do-reply-btn" data-id="${msg.id}">发布回复</button>
              <button class="cancel-reply-btn" data-id="${msg.id}">取消</button>
            </div>
          </div>
        `;
      }).join('');
      
      // 添加事件监听器
      bindReplyEvents();
      
      // 添加展开/收起回复的事件
      bindToggleRepliesEvents();
    }
    
    function bindToggleRepliesEvents() {
      document.querySelectorAll('.toggle-replies-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.getAttribute('data-id');
          const container = document.getElementById('replies-' + id);
          if (container.style.display === 'none') {
            container.style.display = 'block';
            this.innerHTML = this.innerHTML.replace('▼', '▲');
          } else {
            container.style.display = 'none';
            this.innerHTML = this.innerHTML.replace('▲', '▼');
          }
        };
      });
    }
    
    function bindReplyEvents() {
      // 回复按钮
      document.querySelectorAll('.reply-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.getAttribute('data-id');
          const name = this.getAttribute('data-name');
          showReplyFormDirect(id, name);
        };
      });
      
      // 发布回复按钮
      document.querySelectorAll('.do-reply-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.getAttribute('data-id');
          const name = document.getElementById('reply-form-' + id).getAttribute('data-name');
          submitReplyDirect(id, name);
        };
      });
      
      // 取消按钮
      document.querySelectorAll('.cancel-reply-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.getAttribute('data-id');
          hideReplyForm(id);
        };
      });
      
      // 点赞按钮
      document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = function() {
          toggleLikeDirect(this);
        };
      });
    }

    let isSubmitting = false;
    
    async function submitMsg() {
      if (isSubmitting) return;
      
      const btn = document.querySelector('.submit-btn');
      const originalText = btn.textContent;
      
      // 立即禁用按钮
      isSubmitting = true;
      btn.disabled = true;
      btn.textContent = '发布中...';
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
      
      const name = document.getElementById('inp-name').value.trim();
      const city = document.getElementById('inp-city').value.trim();
      const text = document.getElementById('inp-msg').value.trim();
      const mood = document.getElementById('inp-selected-mood').value;
      
      try {
        let submitName = name || '游客';
        if (!text) { 
          resetBtn();
          return;
        }

        const payload = {
          name: submitName.slice(0, 20),
          text: text,
          city: city,
          mood: mood,
          ts: Date.now(),
          likes: 0
        };
        
        await fetchData(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        // 显示刷新提示
        document.body.style.opacity = '0.5';
        
        // 成功后完全重新加载页面
        setTimeout(() => {
          location.href = location.href;
        }, 300);
      } catch (e) {
        console.error('提交失败:', e);
        document.body.style.opacity = '1';
      } finally {
        resetBtn();
      }
      
      function resetBtn() {
        isSubmitting = false;
        btn.disabled = false;
        btn.textContent = originalText;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
      }
    }





    function selectMood(event) {
      const btn = event.target;
      const mood = btn.getAttribute('data-mood');
      
      document.querySelectorAll('.mood-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('inp-selected-mood').value = mood;
    }



    function fmtTime(ts) {
      const d = new Date(ts), now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      return Math.floor(diff / 86400000) + ' 天前';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    function showReplyFormDirect(id, name) {
      // 先隐藏所有回复表单
      document.querySelectorAll('.reply-form').forEach(form => {
        form.style.display = 'none';
      });
      
      // 显示当前的回复表单
      const form = document.getElementById('reply-form-' + id);
      if (form) {
        form.style.display = 'block';
      }
    }
    
    function hideReplyForm(id) {
      const form = document.getElementById('reply-form-' + id);
      if (form) {
        form.style.display = 'none';
      }
    }
    
    let isSubmittingReply = false;
    let activeReplyBtn = null;
    
    async function submitReplyDirect(replyToId, replyToName) {
      if (isSubmittingReply) return;
      
      const textarea = document.getElementById('reply-text-' + replyToId);
      const text = textarea.value.trim();
      
      if (!text) return;
      
      // 找到按钮并禁用
      const replyForm = document.getElementById('reply-form-' + replyToId);
      const btn = replyForm.querySelector('.do-reply-btn');
      const originalText = btn.textContent;
      
      isSubmittingReply = true;
      activeReplyBtn = btn;
      btn.disabled = true;
      btn.textContent = '发布中...';
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
      
      let name = document.getElementById('inp-name').value.trim();
      if (!name) name = '游客';
      
      try {
        const payload = {
          name: name.slice(0, 20),
          text: text,
          ts: Date.now(),
          likes: 0,
          reply_to_id: replyToId,
          reply_to_name: replyToName
        };
        
        await fetchData(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        
        // 显示刷新提示
        document.body.style.opacity = '0.5';
        
        // 成功后完全重新加载页面
        setTimeout(() => {
          location.href = location.href;
        }, 300);
      } catch (e) {
        console.error('回复失败:', e);
        document.body.style.opacity = '1';
      } finally {
        resetReplyBtn();
      }
      
      function resetReplyBtn() {
        isSubmittingReply = false;
        if (activeReplyBtn) {
          activeReplyBtn.disabled = false;
          activeReplyBtn.textContent = originalText;
          activeReplyBtn.style.opacity = '1';
          activeReplyBtn.style.cursor = 'pointer';
        }
        activeReplyBtn = null;
      }
    }
    
    async function toggleLikeDirect(btn) {
      const id = btn.getAttribute('data-id');
      const currentLikes = parseInt(btn.textContent.trim().split(' ')[1]) || 0;
      
      // 先更新UI，让用户感觉快
      const newLikes = currentLikes + 1;
      btn.textContent = `❤️ ${newLikes}`;
      
      // 后台异步提交，不等待
      try {
        await fetchData(`${API_URL}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ likes: newLikes })
        });
        await updateStats();
      } catch (e) { 
        // 失败了也不弹窗，悄悄回退
        console.error('点赞失败:', e);
        btn.textContent = `❤️ ${currentLikes}`;
      }
    }

    async function init() {
      try {
        await loadMsgs();
        setStatus(true, '已连接到云端');
        await renderAll();
        await updateStats();
        initMusic();
      } catch (e) {
        console.error('初始化失败:', e);
        setStatus(false, '连接失败: ' + e.message);
      }
    }

    init();
  </script>
</body>
</html>
