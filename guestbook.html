<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 访客留言板</title>
<style>
  :root {
    --bg-page: #0d1117;
    --bg-card: #161b22;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --primary-color: #58a6ff;
    --accent-red: #f85149;
    --accent-green: #3fb950;
  }
  
  body { 
    background: var(--bg-page); color: var(--text-primary); 
    font-family: 'PingFang SC','Helvetica Neue','Arial',sans-serif;
    max-width: 800px; margin: 0 auto; padding: 20px;
    min-height: 100vh;
  }
  
  .page-header {
    text-align: center;
    margin-bottom: 40px;
    padding: 20px;
  }
  
  .page-title {
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 10px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  
  .form-card {
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-radius: 16px;
    padding: 28px; 
    margin-bottom: 30px;
    transition: all 0.3s ease;
  }
  
  .form-card:hover {
    border-color: var(--primary-color);
    box-shadow: 0 0 20px rgba(88, 166, 255, 0.15);
  }
  
  input, textarea {
    width: 100%; 
    padding: 12px 14px; 
    margin: 10px 0;
    background: #21262d; 
    border: 1px solid var(--border-color); 
    border-radius: 8px;
    color: var(--text-primary);
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.3s ease;
  }
  
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
  }
  
  textarea {
    resize: vertical;
    min-height: 100px;
  }
  
  .submit-btn {
    background: var(--primary-color); 
    color: var(--bg-page); 
    padding: 14px 40px;
    border: none; 
    border-radius: 10px; 
    font-weight: 700; 
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s ease;
    margin-top: 10px;
  }
  
  .submit-btn:hover {
    background: #79c0ff;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3);
  }
  
  .submit-btn:active {
    transform: translateY(0);
  }
  
  .msg-card {
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-radius: 14px;
    padding: 20px; 
    margin-bottom: 15px;
    transition: all 0.3s ease;
  }
  
  .msg-card:hover {
    border-color: var(--primary-color);
    box-shadow: 0 0 15px rgba(88, 166, 255, 0.1);
  }
  
  .msg-header { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 12px; 
  }
  
  .msg-avatar {
    width: 44px; 
    height: 44px; 
    border-radius: 50%;
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-weight: 800; 
    color: var(--bg-page);
    font-size: 16px;
  }
  
  .msg-name { 
    font-weight: 700; 
    font-size: 15px;
  }
  
  .msg-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  
  .msg-body { 
    line-height: 1.7; 
    font-size: 14px;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }
  
  .msg-actions { 
    display: flex; 
    align-items: center;
    gap: 20px; 
    margin-top: 14px; 
    color: var(--text-secondary);
  }
  
  .like-btn { 
    background: transparent; 
    border: 1px solid var(--border-color); 
    padding: 6px 16px; 
    border-radius: 20px; 
    cursor: pointer; 
    color: var(--text-secondary);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
  }
  
  .like-btn:hover {
    border-color: var(--accent-red);
    color: var(--accent-red);
  }
  
  .like-btn.liked { 
    color: var(--accent-red); 
    border-color: var(--accent-red);
    background: rgba(248, 81, 73, 0.1);
  }
  
  .mood-badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    background: rgba(88, 166, 255, 0.15);
    color: var(--primary-color);
  }
  
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  
  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  
  .footer {
    text-align: center;
    padding: 30px 0;
    color: var(--text-secondary);
    font-size: 12px;
  }
  
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
    color: var(--text-secondary);
    font-size: 13px;
  }
  
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>
  <!-- 页面标题 -->
  <div class="page-header">
    <h1 class="page-title">💬 访客留言板</h1>
    <p style="color: var(--text-secondary); margin: 5px 0;">分享你的想法，与大家交流</p>
  </div>

  <!-- 统计信息 -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item">📝 <span id="msg-count">0</span> 条留言</div>
    <div class="stat-item">❤️ <span id="like-count">0</span> 次点赞</div>
  </div>

  <!-- 表单 -->
  <div class="form-card">
    <input id="inp-name" placeholder="你的昵称" maxlength="20">
    <input id="inp-city" placeholder="来自哪里（选填）" maxlength="20">
    <textarea id="inp-msg" placeholder="说点什么..." rows="4" maxlength="300"></textarea>
    <button class="submit-btn" onclick="submitMsg()">发布留言</button>
  </div>

  <!-- 留言列表 -->
  <div id="msg-list"></div>

  <!-- 页脚 -->
  <div class="footer">
    <p>💡 留言仅保存在当前浏览器中</p>
  </div>

  <script>
    const STORAGE_KEY = 'guestbook_messages';
    
    const colors = ['#58a6ff','#3fb950','#f0883e','#bc8cff','#f78166','#d29922','#39d353','#8957e5','#db61a2','#4dabf7'];
    const moods = ['😊 开心', '❤️ 感动', '🤔 思考', '🔥 激动', '✨ 期待', '💪 加油', '🌞 美好', '🎯 专注'];
    
    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
      return colors[Math.abs(h) % colors.length];
    }

    function avatarLetter(name) {
      const ch = name.trim()[0] || '?';
      return /[\u4e00-\u9fff]/.test(ch) ? ch : ch.toUpperCase();
    }

    function loadMsgs() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        console.error('读取失败:', e);
        return [];
      }
    }

    function saveMsgs(msgs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
      updateStats();
    }

    function updateStats() {
      const msgs = loadMsgs();
      const totalLikes = msgs.reduce((sum, m) => sum + (m.likes || 0), 0);
      document.getElementById('msg-count').textContent = msgs.length;
      document.getElementById('like-count').textContent = totalLikes;
    }

    function renderAll() {
      const list = document.getElementById('msg-list');
      const msgs = loadMsgs();
      
      if (msgs.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <p>还没有留言，来做第一个吧！</p>
            <p style="font-size: 13px; margin-top: 10px;">分享你的想法，与大家交流</p>
          </div>
        `;
        return;
      }

      list.innerHTML = msgs.map(msg => `
        <div class="msg-card">
          <div class="msg-header">
            <div class="msg-avatar" style="background:${avatarColor(msg.name)}">${avatarLetter(msg.name)}</div>
            <div>
              <div class="msg-name">${escapeHtml(msg.name)}</div>
              <div class="msg-meta">${msg.city || '未知城市'} · ${fmtTime(msg.ts)}</div>
            </div>
          </div>
          <div class="msg-body">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
          <div class="msg-actions">
            <button class="like-btn" onclick="toggleLike('${msg.id}')">🤍 ${msg.likes || 0}</button>
            ${msg.mood ? `<span class="mood-badge">${msg.mood}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function submitMsg() {
      const name = document.getElementById('inp-name').value.trim();
      const city = document.getElementById('inp-city').value.trim();
      const text = document.getElementById('inp-msg').value.trim();
      
      if (!name) {
        alert('请填写昵称');
        return;
      }
      if (!text) {
        alert('请填写留言内容');
        return;
      }

      const newMsg = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        name: name.slice(0, 20),
        city: city.slice(0, 20),
        text: text,
        ts: Date.now(),
        likes: 0,
        mood: moods[Math.floor(Math.random() * moods.length)]
      };

      const msgs = loadMsgs();
      msgs.unshift(newMsg);
      saveMsgs(msgs);

      alert('留言发布成功！');
      
      // 清空表单
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-city').value = '';
      document.getElementById('inp-msg').value = '';

      renderAll();
    }

    function toggleLike(id) {
      const btn = event.target;
      const currentLikes = parseInt(btn.textContent.split(' ')[1]) || 0;
      
      const msgs = loadMsgs();
      const msg = msgs.find(m => m.id === id);
      if (msg) {
        if (btn.classList.contains('liked')) {
          msg.likes = Math.max(0, msg.likes - 1);
          btn.textContent = `🤍 ${msg.likes}`;
          btn.classList.remove('liked');
        } else {
          msg.likes = (msg.likes || 0) + 1;
          btn.textContent = `❤️ ${msg.likes}`;
          btn.classList.add('liked');
        }
        saveMsgs(msgs);
      }
    }

    function fmtTime(ts) {
      const d = new Date(ts), now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
      const month = d.getMonth() + 1;
      const day = d.getDate();
      return `${month}月${day}日`;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // 初始化
    updateStats();
    renderAll();
  </script>
</body>
</html>
