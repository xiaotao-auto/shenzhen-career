<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全村的希望 - 图标生成器</title>
</head>
<body style="margin:0;background:#0d1127;display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;gap:20px;">
<canvas id="icon" width="1024" height="1024"></canvas>
<p style="color:#00e5ff;font-family:sans-serif;font-size:14px;">右键图片另存为 → 上传到微信小游戏后台</p>
<script>
const canvas = document.getElementById('icon');
const ctx = canvas.getContext('2d');
const S = 1024;
const cx = S/2, cy = S/2;

// 背景渐变 - 深靛蓝到紫
const bgGrad = ctx.createRadialGradient(cx, cy*0.8, 0, cx, cy, S*0.7);
bgGrad.addColorStop(0, '#1a1e3a');
bgGrad.addColorStop(0.5, '#0d1127');
bgGrad.addColorStop(1, '#080b1a');
ctx.fillStyle = bgGrad;
ctx.fillRect(0, 0, S, S);

// 赛博朋克网格地面
ctx.save();
ctx.globalAlpha = 0.15;
ctx.strokeStyle = '#00e5ff';
ctx.lineWidth = 1;
for(let i = 0; i < 30; i++) {
  const y = cy + 200 + i * 20;
  ctx.beginPath();
  ctx.moveTo(0, y);
  ctx.lineTo(S, y);
  ctx.stroke();
}
// 透视竖线
for(let i = -15; i <= 15; i++) {
  ctx.beginPath();
  ctx.moveTo(cx + i*30, cy+200);
  ctx.lineTo(cx + i*200, S);
  ctx.stroke();
}
ctx.restore();

// 霓虹城市天际线剪影
ctx.fillStyle = '#0a0e20';
const buildings = [
  [100, 320, 80, 380], [190, 280, 60, 420], [260, 350, 70, 350],
  [340, 250, 90, 450], [440, 300, 60, 400], [510, 230, 80, 470],
  [600, 290, 70, 410], [680, 340, 60, 360], [750, 270, 90, 430],
  [850, 310, 70, 390], [930, 360, 60, 340]
];
buildings.forEach(([x, y, w, h]) => {
  ctx.fillRect(x, y, w, h);
  // 窗户灯光
  ctx.fillStyle = Math.random() > 0.5 ? '#00e5ff22' : '#ff008022';
  for(let wy = y+15; wy < y+h-10; wy += 25) {
    for(let wx = x+8; wx < x+w-8; wx += 18) {
      if(Math.random() > 0.4) {
        ctx.fillStyle = Math.random() > 0.5 ? '#00e5ff33' : '#ff008033';
        ctx.fillRect(wx, wy, 8, 12);
      }
    }
  }
  ctx.fillStyle = '#0a0e20';
});

// 霓虹发光路径 - 三条人生道路
// 左路 - 财富（金色）
ctx.save();
ctx.globalAlpha = 0.6;
ctx.strokeStyle = '#ffd700';
ctx.lineWidth = 6;
ctx.shadowColor = '#ffd700';
ctx.shadowBlur = 30;
ctx.beginPath();
ctx.moveTo(cx, cy+120);
ctx.quadraticCurveTo(cx-200, cy-50, cx-300, cy-200);
ctx.stroke();
ctx.restore();

// 中路 - 事业（青色）
ctx.save();
ctx.globalAlpha = 0.8;
ctx.strokeStyle = '#00e5ff';
ctx.lineWidth = 6;
ctx.shadowColor = '#00e5ff';
ctx.shadowBlur = 30;
ctx.beginPath();
ctx.moveTo(cx, cy+120);
ctx.quadraticCurveTo(cx, cy-80, cx, cy-250);
ctx.stroke();
ctx.restore();

// 右路 - 家庭（粉色）
ctx.save();
ctx.globalAlpha = 0.6;
ctx.strokeStyle = '#ff0080';
ctx.lineWidth = 6;
ctx.shadowColor = '#ff0080';
ctx.shadowBlur = 30;
ctx.beginPath();
ctx.moveTo(cx, cy+120);
ctx.quadraticCurveTo(cx+200, cy-50, cx+300, cy-200);
ctx.stroke();
ctx.restore();

// 路径终点图标
// 左路 - 金币 💰
ctx.save();
ctx.font = '48px sans-serif';
ctx.textAlign = 'center';
ctx.shadowColor = '#ffd700';
ctx.shadowBlur = 20;
ctx.fillText('💰', cx-310, cy-210);
ctx.restore();

// 中路 - 大楼 🏢
ctx.save();
ctx.font = '48px sans-serif';
ctx.textAlign = 'center';
ctx.shadowColor = '#00e5ff';
ctx.shadowBlur = 20;
ctx.fillText('🏢', cx, cy-260);
ctx.restore();

// 右路 - 家庭 ❤️
ctx.save();
ctx.font = '48px sans-serif';
ctx.textAlign = 'center';
ctx.shadowColor = '#ff0080';
ctx.shadowBlur = 20;
ctx.fillText('🏠', cx+310, cy-210);
ctx.restore();

// 人物剪影 - 背包年轻人
ctx.save();
ctx.fillStyle = '#1a1e3a';
ctx.strokeStyle = '#00e5ff';
ctx.lineWidth = 3;
ctx.shadowColor = '#00e5ff';
ctx.shadowBlur = 15;

// 头
ctx.beginPath();
ctx.arc(cx, cy+10, 25, 0, Math.PI*2);
ctx.fill();
ctx.stroke();

// 身体
ctx.beginPath();
ctx.moveTo(cx, cy+35);
ctx.lineTo(cx, cy+95);
ctx.stroke();

// 背包
ctx.beginPath();
ctx.ellipse(cx-22, cy+50, 12, 25, -0.2, 0, Math.PI*2);
ctx.fillStyle = '#8a2be244';
ctx.fill();
ctx.strokeStyle = '#8a2be2';
ctx.stroke();

// 手臂
ctx.beginPath();
ctx.moveTo(cx, cy+50);
ctx.lineTo(cx-30, cy+80);
ctx.moveTo(cx, cy+50);
ctx.lineTo(cx+30, cy+75);
ctx.stroke();

// 腿
ctx.beginPath();
ctx.moveTo(cx, cy+95);
ctx.lineTo(cx-20, cy+130);
ctx.moveTo(cx, cy+95);
ctx.lineTo(cx+20, cy+130);
ctx.stroke();
ctx.restore();

// 头顶光环效果 - "全村的希望"
ctx.save();
const haloGrad = ctx.createRadialGradient(cx, cy+10, 20, cx, cy+10, 50);
haloGrad.addColorStop(0, '#00e5ff22');
haloGrad.addColorStop(1, 'transparent');
ctx.fillStyle = haloGrad;
ctx.beginPath();
ctx.arc(cx, cy+10, 50, 0, Math.PI*2);
ctx.fill();
ctx.restore();

// 底部大标题
ctx.save();
ctx.font = 'bold 72px "PingFang SC", "Microsoft YaHei", sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

// 文字阴影/发光
ctx.shadowColor = '#00e5ff';
ctx.shadowBlur = 30;
ctx.fillStyle = '#ffffff';
ctx.fillText('全村的希望', cx, cy+240);

// 副标题
ctx.font = '28px "PingFang SC", sans-serif';
ctx.shadowColor = '#ff0080';
ctx.shadowBlur = 15;
ctx.fillStyle = '#ff0080';
ctx.fillText('22岁→50岁 人生模拟器', cx, cy+290);
ctx.restore();

// 装饰 - 四角霓虹边框
ctx.save();
ctx.strokeStyle = '#8a2be2';
ctx.lineWidth = 3;
ctx.shadowColor = '#8a2be2';
ctx.shadowBlur = 10;
// 左上
ctx.beginPath();
ctx.moveTo(30, 80); ctx.lineTo(30, 30); ctx.lineTo(80, 30);
ctx.stroke();
// 右上
ctx.beginPath();
ctx.moveTo(S-30, 80); ctx.lineTo(S-30, 30); ctx.lineTo(S-80, 30);
ctx.stroke();
// 左下
ctx.beginPath();
ctx.moveTo(30, S-80); ctx.lineTo(30, S-30); ctx.lineTo(80, S-30);
ctx.stroke();
// 右下
ctx.beginPath();
ctx.moveTo(S-30, S-80); ctx.lineTo(S-30, S-30); ctx.lineTo(S-80, S-30);
ctx.stroke();
ctx.restore();

// 散落的星星/粒子
ctx.save();
const particles = [];
for(let i = 0; i < 50; i++) {
  particles.push({
    x: Math.random() * S,
    y: Math.random() * S * 0.6,
    r: Math.random() * 2 + 0.5,
    c: ['#00e5ff', '#ff0080', '#8a2be2', '#ffd700'][Math.floor(Math.random()*4)]
  });
}
particles.forEach(p => {
  ctx.globalAlpha = Math.random() * 0.5 + 0.3;
  ctx.fillStyle = p.c;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fill();
});
ctx.restore();

</script>
</body>
</html>
