<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书配图生成 - 温暖家庭风</title>
<style>
  body { margin:0; background:#FFF8F0; display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
  canvas { border-radius:12px; box-shadow: 0 4px 20px rgba(139,115,85,0.15); }
  .label { color:#8B7355; font-family:sans-serif; font-size:12px; text-align:center; margin-top:5px; }
</style>
</head>
<body>
<div>
<canvas id="cover" width="1080" height="1440"></canvas>
<div class="label">封面图 · 右键另存为</div>
</div>
<div>
<canvas id="ending" width="1080" height="1440"></canvas>
<div class="label">结局悬念图 · 右键另存为</div>
</div>
<script>
const c1 = document.getElementById('cover');
const ctx1 = c1.getContext('2d');
const W = 1080, H = 1440;
const petalColors = ['#FFB7C5','#FFDAB9','#FFE4C4','#F5DEB3'];

// 封面 - 温暖渐变背景
const bg1 = ctx1.createLinearGradient(0, 0, 0, H);
bg1.addColorStop(0, '#FFF8F0');
bg1.addColorStop(0.4, '#FFE8D0');
bg1.addColorStop(1, '#F5DEB3');
ctx1.fillStyle = bg1;
ctx1.fillRect(0, 0, W, H);

// 云朵
function drawCloud(ctx,x,y,s,a){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x,y,45*s,0,Math.PI*2);ctx.arc(x+40*s,y-12*s,35*s,0,Math.PI*2);ctx.arc(x+70*s,y,40*s,0,Math.PI*2);ctx.arc(x+30*s,y+8*s,30*s,0,Math.PI*2);ctx.fill();ctx.restore();}
drawCloud(ctx1,100,120,1.2,0.12);drawCloud(ctx1,700,80,0.8,0.1);drawCloud(ctx1,850,200,1,0.08);

// 花瓣
for(let i=0;i<60;i++){ctx1.save();ctx1.globalAlpha=0.15+Math.random()*0.15;ctx1.fillStyle=petalColors[Math.floor(Math.random()*4)];ctx1.beginPath();ctx1.ellipse(Math.random()*W,Math.random()*H,3+Math.random()*4,2+Math.random()*3,Math.random()*Math.PI,0,Math.PI*2);ctx1.fill();ctx1.restore();}

// 暖阳光晕
const sunGlow=ctx1.createRadialGradient(W/2,200,0,W/2,200,400);
sunGlow.addColorStop(0,'rgba(232,118,58,0.15)');sunGlow.addColorStop(1,'transparent');
ctx1.fillStyle=sunGlow;ctx1.fillRect(0,0,W,H);

// 标题
ctx1.save();ctx1.font='bold 140px "PingFang SC","Microsoft YaHei",sans-serif';ctx1.textAlign='center';ctx1.textBaseline='middle';ctx1.fillStyle='#3D2B1F';ctx1.fillText('全村的希望',W/2,360);ctx1.restore();
ctx1.save();ctx1.font='48px "PingFang SC",sans-serif';ctx1.textAlign='center';ctx1.fillStyle='#E8763A';ctx1.fillText('22岁 → 50岁 · 人生模拟器',W/2,480);ctx1.restore();

// 人生道路
ctx1.save();ctx1.lineWidth=6;ctx1.globalAlpha=0.6;
ctx1.strokeStyle='#E8763A';ctx1.beginPath();ctx1.moveTo(W/2,920);ctx1.quadraticCurveTo(W/2-200,720,W/2-280,620);ctx1.stroke();
ctx1.strokeStyle='#D4A843';ctx1.beginPath();ctx1.moveTo(W/2,920);ctx1.quadraticCurveTo(W/2,700,W/2,600);ctx1.stroke();
ctx1.strokeStyle='#5B9BD5';ctx1.beginPath();ctx1.moveTo(W/2,920);ctx1.quadraticCurveTo(W/2+200,720,W/2+280,620);ctx1.stroke();
ctx1.restore();

ctx1.save();ctx1.font='60px sans-serif';ctx1.textAlign='center';ctx1.fillText('💰',W/2-290,600);ctx1.fillText('🏢',W/2,570);ctx1.fillText('🏠',W/2+290,600);ctx1.restore();

// 人物
ctx1.save();ctx1.fillStyle='#8D6E63';ctx1.strokeStyle='#E8763A';ctx1.lineWidth=4;
ctx1.beginPath();ctx1.arc(W/2,770,35,0,Math.PI*2);ctx1.fill();ctx1.stroke();
ctx1.beginPath();ctx1.moveTo(W/2,805);ctx1.lineTo(W/2,870);ctx1.stroke();
ctx1.fillStyle='#D4A84344';ctx1.strokeStyle='#D4A843';ctx1.beginPath();ctx1.ellipse(W/2-28,840,14,30,-0.2,0,Math.PI*2);ctx1.fill();ctx1.stroke();
ctx1.strokeStyle='#E8763A';
ctx1.beginPath();ctx1.moveTo(W/2,830);ctx1.lineTo(W/2-40,870);ctx1.moveTo(W/2,830);ctx1.lineTo(W/2+40,860);ctx1.stroke();
ctx1.beginPath();ctx1.moveTo(W/2,870);ctx1.lineTo(W/2-25,920);ctx1.moveTo(W/2,870);ctx1.lineTo(W/2+25,920);ctx1.stroke();
ctx1.restore();

// 钩子
ctx1.save();ctx1.font='bold 56px "PingFang SC",sans-serif';ctx1.textAlign='center';ctx1.fillStyle='#3D2B1F';ctx1.fillText('你敢走一遍吗？',W/2,1050);ctx1.restore();
ctx1.save();ctx1.font='36px "PingFang SC",sans-serif';ctx1.textAlign='center';ctx1.fillStyle='#8B7355';ctx1.fillText('微信搜「全村的希望」免费畅玩',W/2,1140);ctx1.restore();
ctx1.save();ctx1.strokeStyle='#E8D5C0';ctx1.lineWidth=2;ctx1.beginPath();ctx1.moveTo(100,1300);ctx1.lineTo(W-100,1300);ctx1.stroke();ctx1.restore();
ctx1.save();ctx1.font='28px "PingFang SC",sans-serif';ctx1.textAlign='center';ctx1.fillStyle='#B8A08A';ctx1.fillText('每一个选择，都是你的人生',W/2,1380);ctx1.restore();

// ============ 结局悬念图 ============
const c2 = document.getElementById('ending');
const ctx2 = c2.getContext('2d');
const bg2 = ctx2.createLinearGradient(0,0,0,H);
bg2.addColorStop(0,'#FFF8F0');bg2.addColorStop(0.3,'#FFE0C8');bg2.addColorStop(1,'#F5DEB3');
ctx2.fillStyle=bg2;ctx2.fillRect(0,0,W,H);
for(let i=0;i<50;i++){ctx2.save();ctx2.globalAlpha=0.1+Math.random()*0.15;ctx2.fillStyle=petalColors[Math.floor(Math.random()*4)];ctx2.beginPath();ctx2.ellipse(Math.random()*W,Math.random()*H,3+Math.random()*4,2+Math.random()*3,Math.random()*Math.PI,0,Math.PI*2);ctx2.fill();ctx2.restore();}
ctx2.save();ctx2.font='bold 400px sans-serif';ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillStyle='rgba(232,118,58,0.1)';ctx2.fillText('?',W/2,550);ctx2.restore();
const endings=[{e:'🏆',n:'人生赢家',c:'#D4A843',r:true},{e:'🏠',n:'平淡幸福',c:'#6B9E4F',r:true},{e:'🛏️',n:'身心俱疲',c:'#8D6E63',r:true},{e:'💸',n:'入不敷出',c:'#D45050',r:false},{e:'🏡',n:'归园田居',c:'#6B9E4F',r:false},{e:'😔',n:'满心遗憾',c:'#8B7355',r:false},{e:'🌅',n:'自由人生',c:'#5B9BD5',r:false},{e:'👨‍👩‍👧',n:'家庭至上',c:'#E85D5D',r:false}];
endings.forEach((ed,i)=>{const y=380+i*110;ctx2.save();ctx2.font='48px sans-serif';ctx2.textAlign='left';if(ed.r){ctx2.fillStyle=ed.c;ctx2.fillText(ed.e+' '+ed.n,150,y);}else{ctx2.fillStyle='#C4B09A';ctx2.fillText('🔒 ？？？',150,y);}ctx2.restore();});
ctx2.save();ctx2.font='bold 52px "PingFang SC",sans-serif';ctx2.textAlign='center';ctx2.fillStyle='#E8763A';ctx2.fillText('你的结局是哪一个？',W/2,1320);ctx2.restore();
ctx2.save();ctx2.font='32px "PingFang SC",sans-serif';ctx2.textAlign='center';ctx2.fillStyle='#8B7355';ctx2.fillText('8种结局 · 你能打出几种？',W/2,1390);ctx2.restore();
</script>
</body>
</html>
