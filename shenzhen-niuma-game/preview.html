<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>深圳牛马狂扁老板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0e1a;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#err {
  position: fixed; top: 0; left: 0; right: 0;
  background: red; color: #fff; font: 14px monospace;
  padding: 8px; z-index: 999; display: none; word-break: break-all;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err"></div>
<script>
window.onerror = function(msg, url, line) {
  var e = document.getElementById('err');
  e.style.display = 'block';
  e.textContent = 'ERROR: ' + msg + ' @line' + line;
};

(function() {
  var W = 375, H = 667, P = 3;
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  var dpr = window.devicePixelRatio || 1;
  var scaleW = window.innerWidth / W;
  var scaleH = window.innerHeight / H;
  var scale = Math.min(scaleW, scaleH);
  var cssW = Math.floor(W * scale);
  var cssH = Math.floor(H * scale);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.style.marginLeft = Math.floor((window.innerWidth - cssW) / 2) + 'px';
  canvas.style.marginTop = Math.floor((window.innerHeight - cssH) / 2) + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  // ===========================
  //   6种热梗武器
  // ===========================
  var TOOLS = [
    { id:'sock', name:'臭袜子', emoji:'🧦', damage:12, color:'#6b8e23', pc:'#9acd32',
      ht:['毒气弹!','生化武器!','臭死了!','熏晕了!'],
      effect:'vomit' },
    { id:'pie', name:'画大饼', emoji:'🥧', damage:15, color:'#d4a017', pc:'#ffd700',
      ht:['大饼真香!','再吃一口!','撑死了!','饼太大了!'],
      effect:'fat' },
    { id:'doc', name:'改方案', emoji:'📝', damage:18, color:'#7c3aed', pc:'#a78bfa',
      ht:['再改一版!','第99版!','推翻重来!','需求变了!'],
      effect:'bald' },
    { id:'shoe', name:'穿小鞋', emoji:'👠', damage:20, color:'#e74c3c', pc:'#ff6b6b',
      ht:['夹脚!','走不动!','太小了!','脚断了!'],
      effect:'pain' },
    { id:'pua', name:'PUA话术', emoji:'🧠', damage:25, color:'#2d3436', pc:'#636e72',
      ht:['你不行!','都是为你好!','别人都行!','想太多!'],
      effect:'depress' },
    { id:'dress', name:'穿女装', emoji:'👗', damage:30, color:'#fd79a8', pc:'#fab1a0',
      ht:['美不美!','小裙子!','真好看!','大变样!'],
      effect:'crossdress' },
  ];

  var BOSS_LINES = {
    phase0: ['来加班吧~','这个需求很急','996是福报','PPT改一下','年轻人多吃苦'],
    phase1: ['哎哟!','你敢打我?!','小心绩效!','我可是总监!','你等着!'],
    phase2: ['别打了别打了!','我脸都肿了!','工伤!工伤!','我要告你!','呜呜呜...'],
    phase3: ['求求了...','我投降...','不画饼了...','我不敢了...','放我走吧...'],
    phase4: ['...呜...','(已失去意识)','(全身骨折)','(只剩一口气)','(白旗投降)'],
    phase5: ['......','(已社会性死亡)','(求放过)','(再无颜面)','(彻底崩溃)'],
  };

  // 游戏状态
  var state = 'menu';
  var score = 0, combo = 0, maxCombo = 0, totalHits = 0;
  var lastHitTime = 0, comboTimer = 0;
  var bossHP = 1200, bossMaxHP = 1200;
  var bossX = W / 2, bossY = H * 0.35;
  var bossPhase = 0;
  var bossShakeX = 0, bossShakeY = 0;
  var bossFlashTimer = 0, bossScale = 1;
  var bossHitAnim = 0;
  var bossDialog = '来加班吧~', bossDialogTimer = 0;
  var bossTremble = 0;
  var currentTool = TOOLS[0];
  var particles = [], floats = [];
  var screenShake = 0, attackAnim = 0, attackX = 0, attackY = 0;
  var time = 0;

  // 伤痕
  var bruises = [], bandages = [];

  // 武器特效状态
  var effectVomit = 0, effectFat = 0, effectBald = 0;
  var effectPain = 0, effectDepress = 0, effectDress = 0;
  var vomitY = 0, baldProgress = 0, fatProgress = 0;
  var depressAura = 0, painTears = 0;

  // 办公室装饰
  var officeClock = 0;

  // 菜单动画
  var menuPulse = 0;

  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#00e5ff';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('加载中...', W / 2, H / 2);

  function getPos(e) {
    var rect = canvas.getBoundingClientRect();
    var cx = e.touches ? e.touches[0].clientX : e.clientX;
    var cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - rect.left) / scale, y: (cy - rect.top) / scale };
  }

  function onTap(e) {
    e.preventDefault();
    var p = getPos(e);
    handleTap(p.x, p.y);
  }
  canvas.addEventListener('mousedown', onTap, false);
  canvas.addEventListener('touchstart', onTap, false);

  var lastDragHit = 0;
  function onMove(e) {
    e.preventDefault();
    if (state !== 'playing' || bossHP <= 0) return;
    var now = Date.now();
    if (now - lastDragHit < 100) return;
    var p = getPos(e);
    doAttack(p.x, p.y);
    lastDragHit = now;
  }
  canvas.addEventListener('mousemove', function(e) { if (e.buttons > 0) onMove(e); }, false);
  canvas.addEventListener('touchmove', onMove, false);

  function handleTap(x, y) {
    if (state === 'menu') {
      var bx = W * 0.1, by = H * 0.58, bw = W * 0.8, bh = 56;
      if (x > bx && x < bx + bw && y > by && y < by + bh) startGame();
      return;
    }
    if (state === 'gameover') {
      var bx2 = W * 0.2, by2 = H * 0.68, bw2 = W * 0.6, bh2 = 48;
      if (x > bx2 && x < bx2 + bw2 && y > by2 && y < by2 + bh2) state = 'menu';
      return;
    }
    if (state === 'playing') {
      if (y > H * 0.70) { selectTool(x, y); return; }
      doAttack(x, y);
    }
  }

  function selectTool(x, y) {
    var pad = 6, cols = 3, gap = 5;
    var toolBarY = H * 0.71 + 6;
    var toolW = (W - pad * 2 - gap * 2) / cols;
    var toolH = 50;
    for (var i = 0; i < TOOLS.length; i++) {
      var row = Math.floor(i / cols), col = i % cols;
      var tx = pad + col * (toolW + gap);
      var ty = toolBarY + row * (toolH + gap);
      if (x > tx && x < tx + toolW && y > ty && y < ty + toolH) {
        currentTool = TOOLS[i];
        bossDialog = '你选了' + TOOLS[i].name + '？！';
        bossDialogTimer = 40;
        return;
      }
    }
  }

  function startGame() {
    state = 'playing';
    score = 0; combo = 0; maxCombo = 0; totalHits = 0;
    bossHP = bossMaxHP; bossPhase = 0;
    bossDialog = '来加班吧~'; bossTremble = 0;
    particles = []; floats = [];
    bruises = []; bandages = [];
    currentTool = TOOLS[0];
    effectVomit = 0; effectFat = 0; effectBald = 0;
    effectPain = 0; effectDepress = 0; effectDress = 0;
    baldProgress = 0; fatProgress = 0;
    depressAura = 0; painTears = 0;
  }

  function doAttack(x, y) {
    if (state !== 'playing' || bossHP <= 0) return;
    var dx = x - bossX, dy = y - bossY;
    if (dx * dx + dy * dy > 180 * 180) return;

    var now = Date.now();
    if (now - lastHitTime < 1500) { combo++; if (combo > maxCombo) maxCombo = combo; }
    else { combo = 1; }
    lastHitTime = now; comboTimer = 60;

    var comboBonus = Math.min(combo * 0.1, 2.0);
    var damage = Math.floor(currentTool.damage * (1 + comboBonus));
    bossHP = Math.max(0, bossHP - damage);
    score += damage * combo; totalHits++;

    attackAnim = 15; attackX = x; attackY = y;
    screenShake = 10 + Math.min(combo, 10);
    bossFlashTimer = 8;
    bossHitAnim = 12;
    bossShakeX = (Math.random() - 0.5) * 20;
    bossShakeY = (Math.random() - 0.5) * 20;

    var eff = currentTool.effect;
    if (eff === 'vomit') { effectVomit = 90; }
    else if (eff === 'fat') { effectFat = 120; fatProgress = Math.min(1, fatProgress + 0.2); }
    else if (eff === 'bald') { effectBald = 150; baldProgress = Math.min(1, baldProgress + 0.25); }
    else if (eff === 'pain') { effectPain = 90; painTears = 60; }
    else if (eff === 'depress') { effectDepress = 120; depressAura = 1; }
    else if (eff === 'crossdress') { effectDress = 150; }

    var hpR = bossHP / bossMaxHP;
    var prevPhase = bossPhase;
    if (hpR <= 0.0) bossPhase = 5;
    else if (hpR <= 0.05) bossPhase = 4;
    else if (hpR <= 0.20) bossPhase = 3;
    else if (hpR <= 0.45) bossPhase = 2;
    else if (hpR <= 0.70) bossPhase = 1;
    else bossPhase = 0;

    if (bossPhase > prevPhase) {
      screenShake = 18;
      for (var k = 0; k < 20; k++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 100,
          y: bossY + (Math.random() - 0.5) * 80,
          vx: (Math.random() - 0.5) * 8, vy: -Math.random() * 6 - 2,
          g: 0.15, life: 1, decay: 0.02,
          sz: P * (2 + Math.random() * 4), color: '#fff'
        });
      }
    }

    if (bossPhase >= 1 && bruises.length < 15) {
      bruises.push({
        ox: (Math.random() - 0.5) * 16 * P,
        oy: (Math.random() - 0.8) * 12 * P,
        sz: P * (1 + Math.random() * 2.5),
        alpha: 0.6 + Math.random() * 0.4
      });
    }
    if (bossPhase >= 3 && bandages.length < 10) {
      bandages.push({
        ox: (Math.random() - 0.5) * 18 * P,
        oy: (Math.random() - 0.5) * 18 * P,
        w: P * (2 + Math.random() * 5),
        h: P * (1 + Math.random()),
        rot: Math.random() * 0.5 - 0.25
      });
    }

    bossTremble = [0, 1.5, 2.5, 4, 6, 8][bossPhase];

    var phaseKey = 'phase' + bossPhase;
    var lines = BOSS_LINES[phaseKey];
    bossDialog = lines[Math.floor(Math.random() * lines.length)];
    bossDialogTimer = 50;

    // 粒子
    var pCount = 8 + bossPhase * 4;
    for (var i = 0; i < pCount; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 14, vy: -Math.random() * 12 - 3,
        g: 0.3, life: 1, decay: 0.022 + Math.random() * 0.02,
        sz: P * (1 + Math.random() * 2.5), color: currentTool.pc
      });
    }

    // 武器特效粒子
    if (eff === 'vomit') {
      for (var i = 0; i < 10; i++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 20, y: bossY - 2 * P,
          vx: (Math.random() - 0.5) * 6, vy: Math.random() * 4 + 2,
          g: 0.4, life: 1, decay: 0.015, sz: P * (2 + Math.random() * 3),
          color: i % 2 === 0 ? '#7cfc00' : '#9acd32'
        });
      }
    } else if (eff === 'fat') {
      for (var i = 0; i < 8; i++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 30, y: bossY - 8 * P,
          vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 1,
          g: 0.2, life: 1, decay: 0.018, sz: P * (2 + Math.random() * 2),
          color: i % 2 === 0 ? '#ffd700' : '#d4a017'
        });
      }
    } else if (eff === 'bald') {
      for (var i = 0; i < 6; i++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 30, y: bossY - 22 * P,
          vx: (Math.random() - 0.5) * 8, vy: -Math.random() * 6 - 2,
          g: 0.1, life: 1, decay: 0.015, sz: P * (1 + Math.random()),
          color: '#1a1a2e'
        });
      }
    } else if (eff === 'pain') {
      for (var i = 0; i < 8; i++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 20, y: bossY - 10 * P,
          vx: (Math.random() - 0.5) * 4, vy: Math.random() * 6 + 2,
          g: 0.3, life: 1, decay: 0.02, sz: P * (1 + Math.random()),
          color: '#5dade2'
        });
      }
    } else if (eff === 'depress') {
      for (var i = 0; i < 8; i++) {
        var angle = Math.random() * 6.28;
        particles.push({
          x: bossX + Math.cos(angle) * 50, y: bossY + Math.sin(angle) * 40,
          vx: -Math.cos(angle) * 2, vy: -Math.sin(angle) * 2,
          g: 0, life: 1, decay: 0.012, sz: P * (3 + Math.random() * 3),
          color: '#2d3436'
        });
      }
    } else if (eff === 'crossdress') {
      var sparkles = ['#ff69b4', '#ffb6c1', '#ffd700', '#fff'];
      for (var i = 0; i < 10; i++) {
        particles.push({
          x: bossX + (Math.random() - 0.5) * 60, y: bossY + (Math.random() - 0.5) * 60,
          vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 5 - 1,
          g: 0.1, life: 1, decay: 0.015, sz: P * (1.5 + Math.random() * 2),
          color: sparkles[Math.floor(Math.random() * sparkles.length)]
        });
      }
    }

    // 伤害数字
    floats.push({
      x: x + (Math.random() - 0.5) * 40, y: y - 30,
      text: '-' + damage,
      color: combo >= 5 ? '#ff0080' : combo >= 3 ? '#8a2be2' : '#00e5ff',
      sz: 18 + Math.min(combo * 3, 28), life: 1, vy: -3
    });

    if (combo >= 2) {
      var ht = currentTool.ht;
      floats.push({
        x: bossX + (Math.random() - 0.5) * 80, y: bossY - 140,
        text: ht[Math.floor(Math.random() * ht.length)],
        color: currentTool.color, sz: 24, life: 1, vy: -3
      });
    }

    if (bossHP <= 0) {
      bossPhase = 5;
      bossDialog = '(社会性死亡)...';
      bossDialogTimer = 999;
      bossTremble = 10;
      var colors = ['#ff6b6b','#ffd700','#4a9eff','#66bb6a','#ff69b4','#9b59b6'];
      for (var j = 0; j < 80; j++) {
        particles.push({
          x: W / 2 + (Math.random() - 0.5) * 350, y: H * 0.3,
          vx: (Math.random() - 0.5) * 16, vy: -Math.random() * 16 - 5,
          g: 0.3, life: 1, decay: 0.01 + Math.random() * 0.008,
          sz: P * (1.5 + Math.random() * 3), color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
      setTimeout(function() { state = 'gameover'; }, 2500);
    }
  }

  function update() {
    time++;
    menuPulse = Math.sin(time * 0.04) * 0.5 + 0.5;
    if (state !== 'playing' && state !== 'gameover') return;

    var newP = [];
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.vy += p.g; p.y += p.vy; p.life -= p.decay;
      if (p.life > 0) newP.push(p);
    }
    particles = newP;

    var newF = [];
    for (var i = 0; i < floats.length; i++) {
      var f = floats[i];
      f.y += f.vy; f.life -= 0.025;
      if (f.life > 0) newF.push(f);
    }
    floats = newF;

    bossShakeX *= 0.85; bossShakeY *= 0.85;
    if (bossFlashTimer > 0) bossFlashTimer--;
    if (bossHitAnim > 0) bossHitAnim--;
    if (screenShake > 0) screenShake *= 0.8;
    if (attackAnim > 0) attackAnim--;
    if (comboTimer > 0) comboTimer--;
    if (bossDialogTimer > 0) bossDialogTimer--;

    if (effectVomit > 0) effectVomit--;
    if (effectFat > 0) effectFat--;
    if (effectBald > 0) effectBald--;
    if (effectPain > 0) { effectPain--; painTears--; }
    if (effectDepress > 0) { effectDepress--; depressAura = Math.max(0, depressAura - 0.008); }
    if (effectDress > 0) effectDress--;

    var breathe = Math.sin(time * 0.06) * 0.03;
    var tremble = bossTremble > 0 ? (Math.random() - 0.5) * bossTremble : 0;
    bossScale = 1 + breathe;
    bossX = W / 2 + tremble;
  }

  function roundRect(x, y, w, h, r) {
    if (!r) { ctx.fillRect(x, y, w, h); return; }
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  // ===========================
  //   高级办公室背景
  // ===========================
  function drawOffice() {
    // 深靛青赛博朋克底色
    var bgG = ctx.createLinearGradient(0, 0, 0, H * 0.72);
    bgG.addColorStop(0, '#0d1127');
    bgG.addColorStop(0.4, '#141833');
    bgG.addColorStop(1, '#0a0e1a');
    ctx.fillStyle = bgG;
    ctx.fillRect(0, 0, W, H * 0.72);

    // 墙壁 - 深蓝紫渐变
    var wallG = ctx.createLinearGradient(0, 0, 0, H * 0.55);
    wallG.addColorStop(0, '#1a1e3a');
    wallG.addColorStop(0.5, '#1e2245');
    wallG.addColorStop(1, '#151835');
    ctx.fillStyle = wallG;
    ctx.fillRect(0, 0, W, H * 0.55);

    // 霓虹环境光（紫色+青色）
    var neoG1 = ctx.createRadialGradient(W * 0.7, H * 0.1, 10, W * 0.7, H * 0.3, 200);
    neoG1.addColorStop(0, 'rgba(138,43,226,0.08)');
    neoG1.addColorStop(1, 'rgba(138,43,226,0)');
    ctx.fillStyle = neoG1;
    ctx.fillRect(0, 0, W, H * 0.55);
    var neoG2 = ctx.createRadialGradient(W * 0.3, H * 0.2, 10, W * 0.3, H * 0.4, 150);
    neoG2.addColorStop(0, 'rgba(0,229,255,0.05)');
    neoG2.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = neoG2;
    ctx.fillRect(0, 0, W, H * 0.55);

    // 地板 - 深蓝灰
    var floorG = ctx.createLinearGradient(0, H * 0.55, 0, H * 0.72);
    floorG.addColorStop(0, '#1a1e35');
    floorG.addColorStop(0.3, '#151830');
    floorG.addColorStop(1, '#0e1125');
    ctx.fillStyle = floorG;
    ctx.fillRect(0, H * 0.55, W, H * 0.17);

    // 地板网格线 - 霓虹青
    ctx.strokeStyle = 'rgba(0,229,255,0.06)';
    ctx.lineWidth = 1;
    for (var x = 0; x < W; x += 30) {
      ctx.beginPath(); ctx.moveTo(x, H * 0.55); ctx.lineTo(x, H * 0.72); ctx.stroke();
    }
    for (var y = H * 0.55; y < H * 0.72; y += 15) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // 地板霓虹反光
    var floorShine = ctx.createLinearGradient(0, H * 0.55, 0, H * 0.59);
    floorShine.addColorStop(0, 'rgba(0,229,255,0.04)');
    floorShine.addColorStop(1, 'rgba(0,229,255,0)');
    ctx.fillStyle = floorShine;
    ctx.fillRect(0, H * 0.55, W, H * 0.04);

    // 踢脚线 - 霓虹青光条
    ctx.fillStyle = 'rgba(0,229,255,0.15)';
    ctx.fillRect(0, H * 0.545, W, 2);
    ctx.fillStyle = 'rgba(0,229,255,0.05)';
    ctx.fillRect(0, H * 0.547, W, 3);

    // === 窗户（赛博朋克城市夜景） ===
    var wx = W * 0.60, wy = H * 0.02, ww = 100, wh = 75;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(wx + 3, wy + 3, ww, wh);
    ctx.fillStyle = '#2a2e50';
    ctx.fillRect(wx - 3, wy - 3, ww + 6, wh + 6);
    // 夜空 - 深紫到靛蓝
    var skyG = ctx.createLinearGradient(wx, wy, wx, wy + wh);
    skyG.addColorStop(0, '#0a0a2e');
    skyG.addColorStop(0.5, '#1a1040');
    skyG.addColorStop(1, '#2a1050');
    ctx.fillStyle = skyG;
    ctx.fillRect(wx, wy, ww, wh);
    // 城市天际线剪影
    ctx.fillStyle = 'rgba(10,10,30,0.8)';
    ctx.fillRect(wx + 5, wy + wh - 20, 12, 20);
    ctx.fillRect(wx + 20, wy + wh - 30, 15, 30);
    ctx.fillRect(wx + 38, wy + wh - 22, 10, 22);
    ctx.fillRect(wx + 50, wy + wh - 35, 18, 35);

  // ===========================
  //   老板绘制 + 武器特效
  // ===========================
  function drawBoss(x, y, phase, sc) {
    ctx.save();
    ctx.translate(x + bossShakeX, y + bossShakeY);
    ctx.scale(sc, sc);

    var flash = bossFlashTimer > 0;
    var hit = bossHitAnim > 0;

    if (hit) {
      var hitProg = bossHitAnim / 12;
      ctx.rotate(-0.2 * hitProg);
      ctx.translate(0, -8 * hitProg);
    }

    var p = P;

    // 抑郁暗黑气场
    if (effectDepress > 0 || depressAura > 0) {
      var auraA = Math.max(effectDepress > 0 ? 0.4 : 0, depressAura);
      if (auraA > 0) {
        ctx.fillStyle = 'rgba(20,15,30,' + (auraA * 0.5) + ')';
        ctx.beginPath(); ctx.arc(0, 0, 28 * p, 0, Math.PI * 2); ctx.fill();
        for (var i = 0; i < 6; i++) {
          var da = time * 0.05 + i * 1.047;
          var dr = (20 + Math.sin(time * 0.03 + i) * 5) * p;
          ctx.fillStyle = 'rgba(15,10,25,' + (auraA * 0.3) + ')';
          ctx.fillRect(Math.cos(da) * dr - 3*p, Math.sin(da) * dr - 3*p, 6*p, 6*p);
        }
      }
    }

    var skinColors = ['#f5cba7', '#f0a080', '#e08070', '#c090a0', '#b0a0b0', '#908090'];
    var skinC = flash ? '#fff' : skinColors[phase];
    var isDress = effectDress > 0;
    var suitC = flash ? '#fff' : (isDress ? '#ff69b4' : '#1a1e3a');
    var shirtC = flash ? '#fff' : (isDress ? '#ffb6c1' : '#e0e8ff');
    var tieC = flash ? '#fff' : (isDress ? '#ff1493' : '#ff0080');
    var hairC = flash ? '#fff' : '#0a0a2e';
    var fatScale = 1 + fatProgress * 0.8;

    // ============ 头发 ============
    ctx.fillStyle = hairC;
    var baldFactor = baldProgress;

    if (phase >= 3) {
      if (baldFactor < 0.8) {
        ctx.fillRect(-10*p, -24*p, 20*p * (1-baldFactor*0.5), 3*p);
        ctx.fillRect(-11*p, -21*p, 22*p * (1-baldFactor*0.5), 2*p);
      }
      ctx.fillStyle = skinC;
      ctx.fillRect(-4*p, -24*p, 8*p * baldFactor, 3*p);
      if (baldFactor > 0.5) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(-2*p, -24*p, 4*p, 2*p);
      }
    } else if (baldFactor > 0.1) {
      var hairDrawW = 20 * p * (1 - baldFactor * 0.7);
      ctx.fillRect(-hairDrawW/2, -24*p, hairDrawW, 3*p);
      ctx.fillRect(-hairDrawW/2 - p, -21*p, hairDrawW + 2*p, 2*p);
      if (baldFactor > 0.3) {
        ctx.fillStyle = skinC;
        var baldW = 10 * p * baldFactor;
        ctx.fillRect(-baldW/2, -24*p, baldW, 3*p);
        ctx.fillStyle = 'rgba(255,255,255,' + (baldFactor * 0.4) + ')';
        ctx.fillRect(-baldW/4, -24*p, baldW/2, 2*p);
      }
      if (baldFactor < 0.7) {
        ctx.fillStyle = hairC;
        ctx.fillRect(5*p * (1-baldFactor), -27*p, 2*p, 3*p);
      }
    } else {
      ctx.fillRect(-11*p, -24*p, 22*p, 3*p);
      ctx.fillRect(-12*p, -21*p, 24*p, 2*p);
    }

    // 女装蝴蝶结
    if (isDress) {
      ctx.fillStyle = '#ff1493';
      ctx.fillRect(-14*p, -25*p, 6*p, 3*p);
      ctx.fillRect(8*p, -25*p, 6*p, 3*p);
      ctx.fillRect(-4*p, -26*p, 8*p, 3*p);
      ctx.fillStyle = '#ff69b4';
      ctx.fillRect(-2*p, -26*p, 4*p, 2*p);
    }

    // ============ 脸 ============
    ctx.fillStyle = skinC;
    var faceW = 10 * p * fatScale;
    var faceH = 18 * p;
    ctx.fillRect(-faceW, -21*p, faceW * 2, faceH);

    if (phase >= 2) {
      ctx.fillRect(-faceW - p, -19*p, 2*p, 14*p);
      ctx.fillRect(faceW - p, -19*p, 2*p, 14*p);
    }

    if (fatProgress > 0.3) {
      ctx.fillRect(-faceW + p, -5*p, faceW * 2 - 2*p, 3*p * fatProgress);
    }

    // ============ 淤青 ============
    if (phase >= 1 && !flash) {
      for (var i = 0; i < bruises.length; i++) {
        var b = bruises[i];
        ctx.fillStyle = 'rgba(80,40,120,' + (b.alpha * 0.6) + ')';
        ctx.fillRect(b.ox, b.oy, b.sz, b.sz);
        ctx.fillStyle = 'rgba(180,60,60,' + (b.alpha * 0.4) + ')';
        ctx.fillRect(b.ox - p, b.oy, p, b.sz);
        ctx.fillRect(b.ox + b.sz, b.oy, p, b.sz);
      }
    }

    // ============ 黑眼圈 ============
    if (phase >= 1 && !flash) {
      var eyeBagAlpha = [0, 0.3, 0.5, 0.7, 0.9, 1.0][phase];
      ctx.fillStyle = 'rgba(60,30,80,' + eyeBagAlpha + ')';
      ctx.fillRect(-9*p, -16*p, 7*p, 5*p);
      ctx.fillRect(2*p, -16*p, 7*p, 5*p);
    }

    // ============ 眼睛 ============
    if (effectDepress > 0) {
      ctx.fillStyle = '#555';
      ctx.fillRect(-8*p, -14*p, 6*p, 2*p);
      ctx.fillRect(2*p, -14*p, 6*p, 2*p);
      ctx.fillStyle = '#888';
      ctx.fillRect(-6*p, -14*p, 2*p, 2*p);
      ctx.fillRect(4*p, -14*p, 2*p, 2*p);
    } else if (phase >= 4) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-8*p, -16*p, 6*p, p);
      ctx.fillRect(-7*p, -15*p, 5*p, p);
      ctx.fillRect(-7*p, -13*p, 5*p, p);
      ctx.fillRect(-6*p, -12*p, 4*p, p);
      ctx.fillRect(2*p, -16*p, 6*p, p);
      ctx.fillRect(3*p, -15*p, 5*p, p);
      ctx.fillRect(3*p, -13*p, 5*p, p);
      ctx.fillRect(4*p, -12*p, 4*p, p);
    } else if (phase >= 3) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(-8*p, -15*p, 6*p, 4*p);
      ctx.fillRect(2*p, -15*p, 6*p, 4*p);
      ctx.fillStyle = '#000';
      ctx.fillRect(-7*p, -14*p, p, p);
      ctx.fillRect(-6*p, -15*p, p, p);
      ctx.fillRect(-5*p, -14*p, p, p);
      ctx.fillRect(-4*p, -13*p, p, p);
      ctx.fillRect(3*p, -14*p, p, p);
      ctx.fillRect(4*p, -15*p, p, p);
      ctx.fillRect(5*p, -14*p, p, p);
      ctx.fillRect(6*p, -13*p, p, p);
    } else if (phase >= 2) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-8*p, -14*p, 6*p, p);
      ctx.fillRect(2*p, -14*p, 6*p, p);
      ctx.fillStyle = '#5dade2';
      ctx.fillRect(-8*p, -13*p, p, 4*p);
      ctx.fillRect(7*p, -13*p, p, 4*p);
      if (painTears > 0 || phase >= 2) {
        ctx.fillRect(-9*p, -12*p, p, 6*p);
        ctx.fillRect(8*p, -12*p, p, 6*p);
      }
    } else if (phase >= 1) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-8*p, -15*p, 6*p, 3*p);
      ctx.fillRect(2*p, -15*p, 6*p, 3*p);
      ctx.fillRect(-9*p, -17*p, 7*p, p);
      ctx.fillRect(2*p, -17*p, 7*p, p);
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(-8*p, -15*p, 6*p, 3*p);
      ctx.fillRect(2*p, -15*p, 6*p, 3*p);
      ctx.fillRect(-9*p, -17*p, 7*p, p);
      ctx.fillRect(2*p, -17*p, 7*p, p);
    }

    // ============ 鼻子 ============
    if (phase >= 2 && !flash) {
      ctx.fillStyle = '#ff0080';
      ctx.fillRect(-2*p, -11*p, 5*p, 4*p);
      ctx.fillStyle = '#cc006a';
      ctx.fillRect(-p, -7*p, p, 5*p);
      ctx.fillRect(2*p, -7*p, p, 4*p);
    } else {
      ctx.fillStyle = '#e0b090';
      ctx.fillRect(-p, -11*p, 3*p, 3*p);
    }

    // ============ 嘴巴 ============
    if (effectVomit > 0) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-6*p, -7*p, 12*p, 6*p);
      ctx.fillStyle = '#7cfc00';
      ctx.fillRect(-4*p, -5*p, 8*p, 3*p);
      ctx.fillRect(-3*p, -4*p, 4*p, 8*p);
      ctx.fillStyle = '#9acd32';
      ctx.fillRect(-5*p, -3*p, 3*p, 10*p);
      ctx.fillRect(1*p, -3*p, 3*p, 8*p);
    } else if (effectPain > 0) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-6*p, -7*p, 12*p, 5*p);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-5*p, -7*p, 3*p, p);
      ctx.fillRect(2*p, -7*p, 3*p, p);
      ctx.fillRect(-p, -7*p, 2*p, p);
      ctx.fillStyle = '#5dade2';
      ctx.fillRect(-9*p, -11*p, p, 8*p);
      ctx.fillRect(8*p, -11*p, p, 8*p);
      ctx.fillStyle = 'rgba(93,173,226,0.6)';
      ctx.fillRect(-4*p, -20*p, p, 3*p);
      ctx.fillRect(5*p, -20*p, p, 3*p);
    } else if (phase >= 4) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-5*p, -7*p, 10*p, 3*p);
      ctx.fillStyle = '#5dade2';
      ctx.fillRect(-3*p, -4*p, p, 4*p);
    } else if (phase >= 3) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-5*p, -7*p, 10*p, 4*p);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3*p, -7*p, 2*p, p);
      ctx.fillRect(1*p, -7*p, 2*p, p);
      ctx.fillStyle = '#000';
      ctx.fillRect(-p, -7*p, 2*p, p);
      ctx.fillStyle = '#5dade2';
      ctx.fillRect(-4*p, -3*p, p, 4*p);
    } else if (phase >= 2) {
      ctx.fillStyle = '#000';
      ctx.fillRect(-5*p, -7*p, 10*p, 5*p);
      ctx.fillStyle = '#ff0080';
      ctx.fillRect(-4*p, -6*p, 8*p, 3*p);
    } else if (phase >= 1) {

      ctx.fillRect(-4*p, -6*p, 8*p, 3*p);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3*p, -6*p, 6*p, p);
    } else {
      ctx.fillStyle = '#ff0080';
      ctx.fillRect(-3*p, -5*p, 6*p, p);
    }

    // ============ 呕吐物掉地上 ============
    if (effectVomit > 0) {
      ctx.fillStyle = '#7cfc00';
      ctx.fillRect(-8*p * fatScale, 20*p, 16*p * fatScale, 4*p);
      ctx.fillStyle = '#9acd32';
      ctx.fillRect(-6*p * fatScale, 22*p, 12*p * fatScale, 3*p);
    }

    // ============ 绷带 ============
    if (phase >= 3 && !flash) {

      ctx.fillRect(-11*p, -22*p, 22*p, 2*p);
      ctx.fillRect(-p, -24*p, 2*p, 20*p);

        ctx.fillRect(9*p, -12*p, 2*p, 8*p);
      }
      for (var i = 0; i < bandages.length; i++) {
        var bd = bandages[i];
        ctx.fillRect(bd.ox, bd.oy, bd.w, bd.h);
      }
    }

    // ============ 身体 ============
    var bodyW = 10 * p * fatScale;
    var bodyH = 18 * p;
    ctx.fillStyle = suitC;
    ctx.fillRect(-bodyW, -3*p, bodyW * 2, bodyH);

    ctx.fillStyle = shirtC;
    ctx.fillRect(-bodyW + 4*p, -3*p, (bodyW - 4*p) * 2, 14*p);

    if (isDress) {
      ctx.fillStyle = tieC;
      ctx.fillRect(-4*p, -4*p, 8*p, 3*p);
      ctx.fillRect(-2*p, -3*p, 4*p, 4*p);
    } else {
      ctx.fillStyle = tieC;
      ctx.fillRect(-p, -3*p, 2*p, 12*p);
      ctx.fillRect(-2*p, -3*p, 4*p, 2*p);
    }

    if (!flash && !isDress) {
      ctx.fillStyle = '#121535';
      ctx.fillRect(-bodyW, -3*p, 4*p, 8*p);
      ctx.fillRect(bodyW - 4*p, -3*p, 4*p, 8*p);
    }

    if (isDress) {
      ctx.fillStyle = '#ff69b4';
      ctx.fillRect(-bodyW - 2*p, 10*p, (bodyW + 2*p) * 2, 10*p);
      ctx.fillStyle = '#ffb6c1';
      ctx.fillRect(-bodyW - 2*p, 18*p, (bodyW + 2*p) * 2, 2*p);
      ctx.fillStyle = '#ff1493';
      ctx.fillRect(-3*p, 8*p, 6*p, 2*p);
    }

    ctx.fillStyle = suitC;
    if (phase >= 5) {
      ctx.fillRect(-bodyW - 5*p, 8*p, 5*p, 3*p);
      ctx.fillRect(bodyW, 8*p, 5*p, 3*p);

      ctx.fillRect(-bodyW - 7*p, 8*p, 3*p, 2*p);

    } else if (phase >= 4) {

      ctx.fillRect(-bodyW - 8*p, -10*p, 2*p, 26*p);
      ctx.fillRect(-bodyW - 9*p, -10*p, 4*p, 2*p);
      ctx.fillStyle = suitC;
      ctx.fillRect(bodyW + 2*p, -8*p, 4*p, 10*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(bodyW + 2*p, -10*p, 4*p, 3*p);
      ctx.fillStyle = '#fff';
      ctx.fillRect(bodyW + 6*p, -20*p, 14*p, 10*p);
      ctx.fillStyle = '#ddd';
      ctx.fillRect(bodyW + 6*p, -20*p, p, 10*p);
    } else if (phase >= 3) {
      ctx.fillRect(-bodyW - 5*p, -12*p, 4*p, 3*p);
      ctx.fillRect(-bodyW - 6*p, -16*p, 3*p, 6*p);
      ctx.fillRect(bodyW + 2*p, -12*p, 4*p, 3*p);
      ctx.fillRect(bodyW + 4*p, -16*p, 3*p, 6*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(-bodyW - 7*p, -17*p, 5*p, 3*p);
      ctx.fillRect(bodyW + 3*p, -17*p, 5*p, 3*p);
    } else if (phase >= 2) {
      ctx.fillRect(-bodyW - 5*p, -10*p, 4*p, 3*p);
      ctx.fillRect(-bodyW - 4*p, -13*p, 4*p, 4*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(-bodyW - 5*p, -14*p, 5*p, 4*p);
      ctx.fillStyle = suitC;
      ctx.fillRect(bodyW + 2*p, -8*p, 4*p, 6*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(bodyW + 3*p, -10*p, 4*p, 4*p);
    } else if (phase >= 1) {
      ctx.fillRect(-bodyW - 5*p, 0, 5*p, 3*p);
      ctx.fillRect(-bodyW - 5*p, -5*p, 3*p, 6*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(-bodyW - 6*p, -6*p, 4*p, 3*p);
      ctx.fillStyle = suitC;
      ctx.fillRect(bodyW + 2*p, -10*p, 4*p, 3*p);
      ctx.fillRect(bodyW + 5*p, -10*p, 5*p, p);
      ctx.fillStyle = skinC;
      ctx.fillRect(bodyW + 9*p, -10*p, 3*p, p);
    } else {
      ctx.fillRect(-bodyW - 5*p, 0, 5*p, 3*p);
      ctx.fillRect(-bodyW - 5*p, -5*p, 3*p, 6*p);
      ctx.fillRect(bodyW + 2*p, 0, 5*p, 3*p);
      ctx.fillRect(bodyW + 4*p, -5*p, 3*p, 6*p);
      ctx.fillStyle = skinC;
      ctx.fillRect(-bodyW - 6*p, -6*p, 4*p, 3*p);
      ctx.fillRect(bodyW + 3*p, -6*p, 4*p, 3*p);
    }

    // 女装拿包
    if (isDress && phase < 3) {
      ctx.fillStyle = '#ff1493';
      ctx.fillRect(bodyW + 8*p, 0, 8*p, 6*p);
      ctx.fillRect(bodyW + 9*p, -2*p, 6*p, 2*p);
      ctx.fillStyle = '#d4a017';
      ctx.fillRect(bodyW + 11*p, -2*p, 2*p, 2*p);
    }

    // ============ 穿小鞋 ============
    if (effectPain > 0) {
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(-6*p, 14*p, 5*p, 4*p);
      ctx.fillRect(1*p, 14*p, 5*p, 4*p);
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(-6*p, 18*p, 2*p, 3*p);
      ctx.fillRect(4*p, 18*p, 2*p, 3*p);
    }

    // ============ 晕星 ============
    if (phase >= 2) {
      ctx.fillStyle = '#ffd700';
      var starCount = phase >= 4 ? 6 : phase >= 3 ? 5 : 3;
      for (var i = 0; i < starCount; i++) {
        var a = time * 0.12 + i * (6.283 / starCount);
        var radius = 14 * p;
        var sy = -26 * p + Math.sin(a) * 5 * p;
        var sx = Math.cos(a) * radius;
        ctx.fillRect(sx - p, sy, 3*p, p);
        ctx.fillRect(sx, sy - p, p, 3*p);
      }
    }

    // ============ 抑郁标记 ============
    if (effectDepress > 0) {
      ctx.fillStyle = '#555';
      ctx.fillRect(-10*p, -30*p, 20*p, 5*p);
      ctx.fillRect(-12*p, -28*p, 24*p, 4*p);
      ctx.fillRect(-8*p, -25*p, 16*p, 2*p);
      ctx.fillStyle = '#5dade2';
      var rainOff = time % 20;
      for (var i = 0; i < 5; i++) {
        ctx.fillRect(-8*p + i * 4*p, -23*p + ((rainOff + i * 7) % 15) * p, p, 3*p);
      }
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(-faceW, -21*p, faceW * 2, faceH);
    }

    // ============ 秃头标记 ============
    if (effectBald > 0 && baldProgress > 0.3) {
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#7c3aed';
      ctx.fillText('👨‍🦲', 0, -32*p);
    }

    // ============ 阶段文字 ============
    if (phase >= 1) {
      var phaseLabels = ['', '红肿!', '鼻青脸肿!', '满头绷带!', '全身骨折!', '社会性死亡!'];
      var phaseColors = ['', '#ff9f43', '#e74c3c', '#9b59b6', '#8e44ad', '#6c3483'];
      ctx.font = 'bold ' + (11 + phase * 2) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = phaseColors[phase];
      ctx.fillText(phaseLabels[phase], 0, -28*p - (baldProgress > 0.3 ? 8 : 0));
    }

    ctx.restore();
  }

  // 颜色工具
  function hexOnly(c) {
    if (c.charAt(0) === '#') return c;
    return '#ffffff';
  }
  function lightenColor(hex, amt) {
    if (hex.charAt(0) !== '#' || hex.length < 7) return hex;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    r = Math.min(255, r + amt);
    g = Math.min(255, g + amt);
    b = Math.min(255, b + amt);
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }
  function darkenColor(hex, amt) {
    if (hex.charAt(0) !== '#' || hex.length < 7) return hex;
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    r = Math.max(0, r - amt);
    g = Math.max(0, g - amt);
    b = Math.max(0, b - amt);
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (screenShake > 0.5) {
      ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }
    if (state === 'menu') {
      drawOffice();
      renderMenu();
    } else {
      renderGame();
      if (state === 'gameover') renderGameOver();
    }
    ctx.restore();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
