    const now = Date.now();
    const dataToInsert = demo.map((d, i) => ({
      name: d.name,
      city: d.city,
      mood: d.mood,
      text: d.text,
      ts: now - (i + 1) * 86400000 * 0.5,
      likes: d.likes,
      liked_by: []
    }));

    async function initData() {
      const btn = document.getElementById('btn-init');
      const status = document.getElementById('status');
      const progress = document.getElementById('progress');
      const log = document.getElementById('log');
      
      btn.disabled = true;
      status.innerHTML = '正在添加留言...';
      log.innerHTML = '';

      let successCount = 0;
      let failCount = 0;
      
      // 先测试一条，看看问题
      log.innerHTML += `<div class="item"><b>第一步：先测试连接...</b></div>`;
      try {
        const testData = {
          name: '测试用户',
          city: '测试城市',
          mood: '🤩 超赞',
          text: '这是一条测试留言',
          ts: Date.now(),
          likes: 0,
          liked_by: []
        };
        
        log.innerHTML += `<div class="item">正在插入测试数据...</div>`;
        const { error: testError } = await supabase.from('guestbook').insert(testData);
        
        if (testError) {
          log.innerHTML += `<div class="item error"><b>❌ 测试失败！请先解决这个问题</b></div>`;
          log.innerHTML += `<div class="item error">错误信息: ${JSON.stringify(testError, null, 2)}</div>`;
          
          if (testError.message.includes('does not exist')) {
            log.innerHTML += `
              <div style="margin-top: 20px; padding: 15px; background: #ffe; border: 1px solid #cc9;">
                <h3>⚠️ 需要在 Supabase 后台创建表</h3>
                <p>请在 Supabase 的 SQL Editor 中执行以下 SQL：</p>
                <pre>
create table guestbook (
  id uuid default uuid_generate_v4() primary key,
  name text not null,
  city text,
  mood text,
  text text not null,
  ts bigint not null,
  likes integer default 0,
  liked_by jsonb default '[]'::jsonb
);

alter table guestbook enable row level security;

create policy "allow_read" on guestbook for select using (true);
create policy "allow_insert" on guestbook for insert with check (true);
create policy "allow_update" on guestbook for update using (true);
                </pre>
              </div>
            `;
          }
          
          btn.disabled = false;
          btn.innerHTML = '重试';
          return;
        }
        
        log.innerHTML += `<div class="item success">✅ 测试成功！开始批量添加...</div>`;
      } catch (e) {
        log.innerHTML += `<div class="item error">测试异常: ${e}</div>`;
        btn.disabled = false;
        btn.innerHTML = '重试';
        return;
      }

      // 分批插入，每次5条
      for (let i = 0; i < dataToInsert.length; i += 5) {
        const batch = dataToInsert.slice(i, i + 5);
        
        try {
          const { error } = await supabase.from('guestbook').insert(batch);
          
          if (error) {
            console.error('插入失败:', error);
            failCount += batch.length;
            log.innerHTML += `<div class="item error">第 ${i + 1}-${i + batch.length} 条：插入失败 - ${error.message}</div>`;
          } else {
            successCount += batch.length;
            log.innerHTML += `<div class="item success">✅ 第 ${i + 1}-${i + batch.length} 条：已添加</div>`;
          }
        } catch (e) {
          console.error('异常:', e);
          failCount += batch.length;
          log.innerHTML += `<div class="item error">第 ${i + 1}-${i + batch.length} 条：异常 - ${e}</div>`;
        }

        // 更新进度
        const pct = Math.round((i + batch.length) / dataToInsert.length * 100);
        progress.innerHTML = `${pct}%`;
        
        // 稍作延迟防止太快
        await new Promise(r => setTimeout(r, 200));
      }

      status.innerHTML = `<span class="success">✅ 完成！成功添加 ${successCount} 条留言</span>`;
      if (failCount > 0) {
        status.innerHTML += `<span class="error">，失败 ${failCount} 条</span>`;
      }
      
      btn.disabled = false;
      btn.innerHTML = '再添加一次';
      
      log.innerHTML += `<hr><p><a href="guestbook.html">🎉 去留言板看看 →</a></p>`;
    }

    // 页面加载时先检查当前数据
    async function checkCurrent() {
      try {
        const { data, error } = await supabase.from('guestbook').select('*', { count: 'exact' });
        if (!error) {
          document.getElementById('status').innerHTML = `当前已有 ${data?.length || 0} 条留言`;
        }
      } catch (e) {
        console.log(e);
      }
    }
