<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>按钮测试</title>
  <style>
    body { background: #0d1117; color: #e6edf3; padding: 50px; }
    button { padding: 15px 30px; font-size: 18px; background: #58a6ff; color: #0d1117; border: none; border-radius: 8px; cursor: pointer; }
    #log { margin-top: 20px; padding: 15px; background: #161b22; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>按钮测试页面</h1>
  <button onclick="testBtn()">点击我测试</button>
  <div id="log">点击按钮看这里</div>

  <script>
    console.log('页面加载完成');
    
    function testBtn() {
      console.log('按钮被点击了！');
      document.getElementById('log').innerHTML = '✅ 按钮点击成功！<br>' + new Date().toLocaleString();
    }
  </script>
</body>
</html>
